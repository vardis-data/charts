name: Release Charts

on:
  push:
    branches: [main]
    paths: ["charts/**"]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.list.outputs.charts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Add external repos
        run: helm repo add valkey https://valkey.io/valkey-helm
      - id: list
        run: |
          charts=$(ct list-changed --config ct.yaml --since HEAD~1 | jq -R -s -c 'split("\n")[:-1]')
          echo "charts=$charts" >> "$GITHUB_OUTPUT"

  release:
    needs: detect
    if: needs.detect.outputs.charts != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        chart: ${{ fromJson(needs.detect.outputs.charts) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with: { version: latest }
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Add external repos
        run: helm repo add valkey https://valkey.io/valkey-helm
      - name: Release ${{ matrix.chart }}
        id: release
        run: |
          CHART="${{ matrix.chart }}"
          NAME=$(basename "$CHART")
          REGISTRY="oci://ghcr.io/${{ github.repository_owner }}/charts"
          VERSION=$(grep '^version:' "$CHART/Chart.yaml" | awk '{print $2}')

          # Bump if version exists in registry
          while helm show chart "${REGISTRY}/${NAME}" --version "${VERSION}" &>/dev/null; do
            IFS='.' read -r major minor patch <<< "$VERSION"
            patch=$((patch + 1))
            VERSION="${major}.${minor}.${patch}"
            sed -i "s/^version:.*/version: ${VERSION}/" "$CHART/Chart.yaml"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          done

          echo "Releasing $NAME $VERSION..."
          helm dependency update "$CHART"
          ct lint --config ct.yaml --since HEAD~1
          helm package "$CHART"
          helm push "${NAME}-${VERSION}.tgz" "${REGISTRY}"
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        if: steps.release.outputs.bumped == 'true'
        with:
          commit_message: "ci: bump ${{ matrix.chart }} [skip ci]"
          file_pattern: "${{ matrix.chart }}/Chart.yaml"
