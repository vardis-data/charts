name: Release Charts

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      chart:
        description: "Chart to release (leave empty for all)"
        required: false
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  REGISTRY_PREFIX: ghcr.io/${{ github.repository_owner }}/charts
  HELM_UNITTEST_VERSION: "1.1.0"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect charts to release
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.chart }}" ]; then
              CHARTS="${{ inputs.chart }}"
            else
              CHARTS=$(ls -d charts/*/ | xargs -I{} basename {} | tr '\n' ' ')
            fi
          else
            COMMIT_MSG=$(git log -1 --pretty=%s)
            echo "Commit: $COMMIT_MSG"

            if [[ "$COMMIT_MSG" =~ ^\[skip\ ci\] ]] || [[ "$COMMIT_MSG" =~ ^chore:\ bump ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            CHART_NAME=$(echo "$COMMIT_MSG" | grep -oP '^[a-z0-9_-]+(?=:)' || true)

            if [ -z "$CHART_NAME" ] || [ ! -d "charts/$CHART_NAME" ]; then
              echo "No chart matched in commit message — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            CHARTS="$CHART_NAME"
          fi

          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        if: steps.detect.outputs.skip != 'true'
        uses: azure/setup-helm@v5

      - name: Cache helm-unittest binary
        if: steps.detect.outputs.skip != 'true'
        id: cache-unittest
        uses: actions/cache@v4
        with:
          path: ~/.local/share/helm/plugins/helm-unittest
          key: helm-unittest-${{ env.HELM_UNITTEST_VERSION }}-linux-amd64

      - name: Install helm-unittest
        if: steps.detect.outputs.skip != 'true' && steps.cache-unittest.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(helm env HELM_PLUGINS)/helm-unittest"
          curl -sSL "https://github.com/helm-unittest/helm-unittest/releases/download/v${{ env.HELM_UNITTEST_VERSION }}/helm-unittest-linux-amd64-${{ env.HELM_UNITTEST_VERSION }}.tgz" \
            | tar -xz -C "$(helm env HELM_PLUGINS)/helm-unittest"

      - name: Login to GHCR
        if: steps.detect.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Configure git
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release charts
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHARTS: ${{ steps.detect.outputs.charts }}
        run: |
          helm repo add valkey https://valkey.io/valkey-helm

          for CHART in $CHARTS; do
            echo "::group::$CHART"

            git pull --rebase origin main

            CHART_YAML="charts/$CHART/Chart.yaml"
            CURRENT=$(yq eval '.version' "$CHART_YAML")
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            export NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            TAG="$CHART-v$NEW_VERSION"

            if git tag --list | grep -qx "$TAG"; then
              echo "$TAG already released — skipping"
              echo "::endgroup::"
              continue
            fi

            yq e '.version = strenv(NEW_VERSION)' -i "$CHART_YAML"

            if grep -q "^dependencies:" "$CHART_YAML"; then
              helm dependency update "charts/$CHART"
            fi

            if [ -d "charts/$CHART/tests" ]; then
              helm unittest "charts/$CHART"
            fi

            helm package "charts/$CHART" --destination ./packaged/
            helm push "./packaged/$CHART-$NEW_VERSION.tgz" "oci://${{ env.REGISTRY_PREFIX }}"

            git add "$CHART_YAML"
            git commit -m "chore: bump $CHART to $NEW_VERSION [skip ci]"
            git tag "$TAG"
            git push origin HEAD:main
            git push origin "$TAG"

            PREV_TAG=$(git tag --sort=-v:refname | grep -E "^${CHART}-v" | sed -n '2p' || true)
            gh release create "$TAG" \
              --title "Release $TAG" \
              ${PREV_TAG:+--notes-start-tag "$PREV_TAG"} \
              --generate-notes \
              --notes "## $CHART $TAG

          ### Installation

          \`\`\`bash
          helm install my-release oci://${{ env.REGISTRY_PREFIX }}/$CHART --version $NEW_VERSION
          \`\`\`

          ### Pull

          \`\`\`bash
          helm pull oci://${{ env.REGISTRY_PREFIX }}/$CHART --version $NEW_VERSION
          \`\`\`"

            echo "::endgroup::"
          done
