name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "charts/**"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push charts
        run: |
          for chart in charts/*; do
            if [ -d "$chart" ]; then
              chart_name=$(basename $chart)
              chart_version=$(grep '^version:' $chart/Chart.yaml | awk '{print $2}')
              echo "Processing chart: $chart_name ($chart_version)"

              if helm show chart oci://ghcr.io/${{ github.repository_owner }}/charts/${chart_name} --version ${chart_version} &>/dev/null; then
                echo "Skipping $chart_name $chart_version: already exists in registry"
                continue
              fi

              helm dependency update $chart
              helm package $chart
              helm push ${chart_name}-${chart_version}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
            fi
          done
