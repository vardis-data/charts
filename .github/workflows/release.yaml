name: Release Charts

on:
  push:
    branches: [main]
    paths: ["charts/**"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest.git

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint changed charts
        run: ct lint --config ct.yaml

      - name: Test changed charts
        run: |
          for chart in $(ct list-changed --config ct.yaml); do
            if [ -d "${chart}/tests" ]; then
              echo "Testing $chart..."
              helm unittest "$chart"
            fi
          done

      - name: Bump and release changed charts
        id: bump
        run: |
          REGISTRY="oci://ghcr.io/${{ github.repository_owner }}/charts"
          bumped=false

          for chart in $(ct list-changed --config ct.yaml); do
            name=$(basename "$chart")
            version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')

            while helm show chart "${REGISTRY}/${name}" --version "${version}" &>/dev/null; do
              major=$(echo "$version" | cut -d. -f1)
              minor=$(echo "$version" | cut -d. -f2)
              patch=$(echo "$version" | cut -d. -f3)
              patch=$((patch + 1))
              version="${major}.${minor}.${patch}"
              sed -i "s/^version:.*/version: ${version}/" "$chart/Chart.yaml"
              bumped=true
              echo "Bumped $name to $version"
            done

            echo "Releasing $name $version..."
            helm dependency update "$chart"
            helm package "$chart"
            helm push "${name}-${version}.tgz" "${REGISTRY}"
          done

          if [ "$bumped" = true ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bumps
        if: steps.bump.outputs.bumped == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: bump chart versions [skip ci]"
          file_pattern: "charts/*/Chart.yaml"
