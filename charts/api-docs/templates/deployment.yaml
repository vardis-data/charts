apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-docs.fullname" . }}
  labels:
    {{- include "api-docs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "api-docs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "api-docs.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redoc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SPEC_URL
              value: {{ .Values.openapiUrl | quote }}
            - name: PAGE_TITLE
              value: "Vardis API Documentation"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
