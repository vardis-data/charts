apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gatewayClass.name }}
  labels:
    {{- include "cloudflare-gateway.labels" . | nindent 4 }}
spec:
  controllerName: {{ .Values.gatewayClass.controllerName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflare-gateway.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
    - name: websecure
      port: {{ .Values.gateway.httpsPort }}
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: vardis-space-wildcard
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
    - name: web
      port: {{ .Values.gateway.httpPort }}
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
