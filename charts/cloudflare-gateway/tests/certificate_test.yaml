suite: certificate tests
templates:
  - templates/certificate.yaml
tests:
  - it: should render Certificate when certManager is enabled
    asserts:
      - isKind:
          of: Certificate

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: vardis-space-wildcard

  - it: should store cert in matching Secret name
    asserts:
      - equal:
          path: spec.secretName
          value: vardis-space-wildcard

  - it: should reference the ClusterIssuer
    asserts:
      - equal:
          path: spec.issuerRef.name
          value: letsencrypt-prod
      - equal:
          path: spec.issuerRef.kind
          value: ClusterIssuer

  - it: should have default dnsNames for vardis.space and wildcard
    asserts:
      - lengthEqual:
          path: spec.dnsNames
          count: 2
      - contains:
          path: spec.dnsNames
          content: vardis.space
      - contains:
          path: spec.dnsNames
          content: "*.vardis.space"

  - it: should respect custom dnsNames
    set:
      certManager.dnsNames:
        - example.com
        - "*.example.com"
    asserts:
      - lengthEqual:
          path: spec.dnsNames
          count: 2
      - contains:
          path: spec.dnsNames
          content: example.com
      - contains:
          path: spec.dnsNames
          content: "*.example.com"

  - it: should not render when certManager is disabled
    set:
      certManager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-gateway
      - exists:
          path: metadata.labels["helm.sh/chart"]
