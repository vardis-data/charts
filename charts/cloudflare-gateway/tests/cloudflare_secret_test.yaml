suite: cloudflare secret tests
templates:
  - templates/cloudflare-secret.yaml
tests:
  - it: should render Secret when certManager is enabled
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: cloudflare-api-token

  - it: should use api-token key with envsubst reference
    asserts:
      - equal:
          path: stringData.api-token
          value: "ref+envsubst://$CLOUDFLARE_API_TOKEN"

  - it: should not render when certManager is disabled
    set:
      certManager.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-gateway
      - exists:
          path: metadata.labels["helm.sh/chart"]
