suite: httproutes tests
templates:
  - templates/httproutes.yaml
tests:
  - it: should not render anything when httproutes is empty
    asserts:
      - hasDocuments:
          count: 0

  - it: should render one HTTPRoute per entry
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
        api:
          hostnames:
            - api.vardis.space
          service: api-backend
          port: 8080
          namespace: backend
    asserts:
      - hasDocuments:
          count: 2

  - it: should set correct metadata for first route
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: datalake
      - equal:
          path: metadata.namespace
          value: lakehouse

  - it: should reference the Gateway as parent
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: vardis

  - it: should use Release.Namespace for Gateway parent when chart deployed in same namespace
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - equal:
          path: spec.parentRefs[0].namespace
          value: NAMESPACE

  - it: should set hostname on the route
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - lengthEqual:
          path: spec.hostnames
          count: 1
      - contains:
          path: spec.hostnames
          content: datalake.vardis.space

  - it: should support multiple hostnames
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
            - lake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - lengthEqual:
          path: spec.hostnames
          count: 2
      - contains:
          path: spec.hostnames
          content: datalake.vardis.space
      - contains:
          path: spec.hostnames
          content: lake.vardis.space

  - it: should set path match to root
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: should reference backend service and port
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: lakehouse-cube
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 4000

  - it: should default namespace to default when not specified
    set:
      httproutes:
        backend:
          hostnames:
            - backend.vardis.space
          service: backend-svc
          port: 80
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - equal:
          path: metadata.namespace
          value: default

  - it: should have standard labels
    set:
      httproutes:
        datalake:
          hostnames:
            - datalake.vardis.space
          service: lakehouse-cube
          port: 4000
          namespace: lakehouse
    documentIndex: 0
    documentSelector:
      path: kind
      value: HTTPRoute
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-gateway
      - exists:
          path: metadata.labels["helm.sh/chart"]
