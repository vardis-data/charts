{{- if .Values.cloudflared.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudflare-ingress.cloudflaredName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudflare-ingress.labels" . | nindent 4 }}
spec:
  {{- if .Values.cloudflared.replicas }}
  replicas: {{ .Values.cloudflared.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cloudflare-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cloudflare-ingress.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: cloudflared
          image: "{{ .Values.cloudflared.image.repository }}:{{ .Values.cloudflared.image.tag }}"
          imagePullPolicy: {{ .Values.cloudflared.image.pullPolicy }}
          args:
            {{- toYaml .Values.cloudflared.args | nindent 12 }}
            {{- if .Values.tunnel.ingress }}
            - --config
            - /etc/cloudflared/config.yaml
            {{- end }}
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudflare-ingress.cloudflaredName" . }}-tunnel
                  key: TUNNEL_TOKEN
          {{- if .Values.tunnel.ingress }}
          volumeMounts:
            - name: cloudflared-config
              mountPath: /etc/cloudflared
              readOnly: true
          {{- end }}
          {{- with .Values.cloudflared.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.cloudflared.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.tunnel.ingress }}
      volumes:
        - name: cloudflared-config
          configMap:
            name: {{ include "cloudflare-ingress.cloudflaredName" . }}-config
      {{- end }}
{{- end }}
