suite: cloudflared deployment tests
templates:
  - templates/cloudflared-deployment.yaml
tests:
  - it: should render Deployment when cloudflared is enabled
    asserts:
      - isKind:
          of: Deployment

  - it: should use fullname pattern for deployment name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cloudflare-ingress

  - it: should have 2 replicas by default
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should respect custom replica count
    set:
      cloudflared.replicas: 4
    asserts:
      - equal:
          path: spec.replicas
          value: 4

  - it: should use cloudflared image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "cloudflare/cloudflared:2025.5.0"

  - it: should respect custom image
    set:
      cloudflared.image.repository: my-registry/cloudflared
      cloudflared.image.tag: 2025.6.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-registry/cloudflared:2025.6.0"

  - it: should have tunnel run args
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: tunnel
      - equal:
          path: spec.template.spec.containers[0].args[1]
          value: "--no-autoupdate"
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: run

  - it: should read TUNNEL_TOKEN from secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: TUNNEL_TOKEN
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: RELEASE-NAME-cloudflare-ingress-tunnel
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: TUNNEL_TOKEN

  - it: should have liveness probe on /ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 2000
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 1
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 10

  - it: should have resource requests
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 50m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 64Mi

  - it: should have resource limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 200m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should not render when cloudflared is disabled
    set:
      cloudflared.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-ingress
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: cloudflare-ingress
