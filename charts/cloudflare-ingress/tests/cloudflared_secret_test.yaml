suite: cloudflared secret tests
templates:
  - templates/cloudflared-secret.yaml
tests:
  - it: should render secret when cloudflared is enabled
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: cloudflared-tunnel

  - it: should render tunnel token from values
    set:
      cloudflared.tunnelToken: "my-tunnel-token"
    asserts:
      - equal:
          path: stringData.TUNNEL_TOKEN
          value: "my-tunnel-token"

  - it: should not render when cloudflared is disabled
    set:
      cloudflared.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: cloudflare-ingress
      - exists:
          path: metadata.labels["helm.sh/chart"]
