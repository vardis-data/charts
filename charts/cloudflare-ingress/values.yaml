# -- cloudflared tunnel client
cloudflared:
  enabled: true
  image:
    repository: cloudflare/cloudflared
    tag: 2025.5.0
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # -- tunnel token (set via vals ref+envsubst in infra values)
  tunnelToken: ""
  # -- cloudflared arguments
  args:
    - tunnel
    - --no-autoupdate
    - run
  livenessProbe:
    httpGet:
      path: /ready
      port: 2000
    failureThreshold: 1
    initialDelaySeconds: 10
    periodSeconds: 10

# -- Cloudflare Tunnel ingress routing rules
tunnel:
  # -- List of ingress rules. Each rule has hostname and service.
  # A catch-all http_status:404 is always appended automatically.
  ingress: []
  # - hostname: example.vardis.space
  #   service: http://my-service.my-namespace.svc.cluster.local:8080

# -- cert-manager resources (ClusterIssuer + Certificate + Secret)
certManager:
  enabled: true
  # -- Cloudflare API token for DNS01 solver (set via vals ref+envsubst in infra values)
  apiToken: ""
  # -- Namespace where the API token secret is created (must match cert-manager's cluster-resource-namespace)
  secretNamespace: cert-manager
  email: contato@vardis.space
  # -- Let's Encrypt server (production by default)
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  # -- Wildcard certificate for the zone
  dnsNames:
    - vardis.space
    - "*.vardis.space"
