apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "docmost.fullname" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "docmost.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docmost.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: docmost
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: APP_URL
              value: {{ .Values.appUrl | quote }}
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: APP_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: REDIS_URL
            {{- if .Values.s3.enabled }}
            - name: STORAGE_DRIVER
              value: "s3"
            - name: AWS_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: AWS_S3_ACCESS_KEY_ID
            - name: AWS_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: AWS_S3_SECRET_ACCESS_KEY
            - name: AWS_S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: AWS_S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: AWS_S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: AWS_S3_FORCE_PATH_STYLE
              value: {{ .Values.s3.forcePathStyle | quote }}
            {{- end }}
            {{- if .Values.smtp.enabled }}
            - name: MAIL_DRIVER
              value: "smtp"
            - name: SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: SMTP_USERNAME
              value: {{ .Values.smtp.username | quote }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "docmost.fullname" . }}
                  key: SMTP_PASSWORD
            - name: SMTP_SECURE
              value: {{ .Values.smtp.secure | quote }}
            - name: MAIL_FROM_ADDRESS
              value: {{ .Values.smtp.fromAddress | quote }}
            - name: MAIL_FROM_NAME
              value: {{ .Values.smtp.fromName | quote }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
