{{- if not .Values.existingSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docmost.fullname" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_SECRET: {{ .Values.appSecret | quote }}
  DATABASE_URL: {{ include "docmost.databaseUrl" . | quote }}
  REDIS_URL: {{ include "docmost.redisUrl" . | quote }}
  {{- if .Values.smtp.enabled }}
  SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
  {{- end }}
  {{- if .Values.s3.enabled }}
  AWS_S3_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | quote }}
  AWS_S3_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | quote }}
  {{- end }}
{{- end }}
