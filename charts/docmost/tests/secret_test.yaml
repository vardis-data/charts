suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should not render when existingSecret is enabled
    set:
      existingSecret:
        enabled: true
        name: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docmost

  - it: should contain APP_SECRET
    set:
      appSecret: my-secret
    asserts:
      - equal:
          path: stringData.APP_SECRET
          value: "my-secret"

  - it: should generate DATABASE_URL with embedded postgres
    set:
      postgres:
        enabled: true
        customUser:
          name: docmost
          database: docmost
          password: testpass
    asserts:
      - equal:
          path: stringData.DATABASE_URL
          value: "postgresql://docmost:testpass@RELEASE-NAME-postgres:5432/docmost?schema=public"

  - it: should generate DATABASE_URL with external database
    set:
      postgres:
        enabled: false
      database:
        host: db.example.com
        port: 5432
        name: docmost
        user: docmost
        password: secret
    asserts:
      - equal:
          path: stringData.DATABASE_URL
          value: "postgresql://docmost:secret@db.example.com:5432/docmost?schema=public"

  - it: should contain S3 credentials when enabled
    set:
      s3:
        enabled: true
        accessKeyId: my-key
        secretAccessKey: my-secret
    asserts:
      - equal:
          path: stringData.AWS_S3_ACCESS_KEY_ID
          value: "my-key"
      - equal:
          path: stringData.AWS_S3_SECRET_ACCESS_KEY
          value: "my-secret"

  - it: should contain SMTP password when enabled
    set:
      smtp:
        enabled: true
        password: smtp-pass
    asserts:
      - equal:
          path: stringData.SMTP_PASSWORD
          value: "smtp-pass"

  - it: should generate valid REDIS_URL with valkey enabled (no leading newline)
    set:
      valkey:
        enabled: true
        password: testpass
    asserts:
      - matchRegex:
          path: stringData.REDIS_URL
          pattern: "^redis://default:testpass@.*:6379$"

  - it: should generate valid REDIS_URL without password
    set:
      valkey:
        enabled: true
        password: ""
    asserts:
      - matchRegex:
          path: stringData.REDIS_URL
          pattern: "^redis://.*:6379$"
