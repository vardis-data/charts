suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docmost

  - it: should contain APP_SECRET
    set:
      appSecret: my-secret
    asserts:
      - equal:
          path: stringData.APP_SECRET
          value: "my-secret"

  - it: should generate DATABASE_URL with embedded postgres
    set:
      postgres:
        enabled: true
        customUser:
          name: docmost
          database: docmost
          password: testpass
    asserts:
      - equal:
          path: stringData.DATABASE_URL
          value: "postgresql://docmost:testpass@RELEASE-NAME-postgres:5432/docmost?schema=public"

  - it: should contain S3 credentials when inline
    set:
      s3:
        enabled: true
        accessKeyId: my-key
        secretAccessKey: my-secret
    asserts:
      - equal:
          path: stringData.AWS_S3_ACCESS_KEY_ID
          value: "my-key"
      - equal:
          path: stringData.AWS_S3_SECRET_ACCESS_KEY
          value: "my-secret"

  - it: should not contain S3 credentials when using existing secret
    set:
      s3:
        enabled: true
        existingSecret:
          name: s3-credentials
    asserts:
      - notExists:
          path: stringData.AWS_S3_ACCESS_KEY_ID
      - notExists:
          path: stringData.AWS_S3_SECRET_ACCESS_KEY

  - it: should contain SMTP password when enabled
    set:
      smtp:
        enabled: true
        password: smtp-pass
    asserts:
      - equal:
          path: stringData.SMTP_PASSWORD
          value: "smtp-pass"

  - it: should generate valid REDIS_URL with valkey enabled (no leading newline)
    set:
      valkey:
        enabled: true
        password: testpass
    asserts:
      - matchRegex:
          path: stringData.REDIS_URL
          pattern: "^redis://default:testpass@.*:6379$"
