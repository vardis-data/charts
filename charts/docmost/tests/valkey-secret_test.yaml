suite: valkey-secret tests
templates:
  - templates/valkey-secret.yaml
tests:
  - it: should render when valkey enabled with password
    set:
      valkey:
        enabled: true
        password: my-valkey-pass
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-docmost-valkey-auth

  - it: should contain password in stringData
    set:
      valkey:
        enabled: true
        password: my-valkey-pass
    asserts:
      - equal:
          path: stringData.default
          value: "my-valkey-pass"

  - it: should not render when valkey disabled
    set:
      valkey:
        enabled: false
        password: my-valkey-pass
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when password empty
    set:
      valkey:
        enabled: true
        password: ""
    asserts:
      - hasDocuments:
          count: 0
