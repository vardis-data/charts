image:
  repository: docmost/docmost
  # renovate: datasource=docker depName=docmost/docmost
  tag: "0.8.2"
  pullPolicy: IfNotPresent

replicaCount: 1

appUrl: ""
appSecret: ""

database:
  host: ""
  port: 5432
  name: docmost
  user: docmost
  password: ""

redis:
  host: ""
  port: 6379
  password: ""

valkey:
  enabled: true
  password: ""
  replicaCount: 1
  dataStorage:
    enabled: false
  service:
    type: ClusterIP
    port: 6379
  metrics:
    enabled: true
  auth:
    enabled: true
    usersExistingSecret: "docmost-valkey-auth"
    aclUsers:
      default:
        permissions: "~* &* +@all"

s3:
  enabled: false
  endpoint: ""
  region: ""
  bucket: ""
  accessKeyId: ""
  secretAccessKey: ""
  forcePathStyle: true
  existingSecret:
    name: ""
    keys:
      accessKeyId: "s3AccessKeyId"
      secretAccessKey: "s3SecretAccessKey"

smtp:
  enabled: false
  host: ""
  port: 587
  username: ""
  password: ""
  secure: true
  fromAddress: ""
  fromName: "Docmost"
  existingSecret:
    name: ""
    keys:
      password: "smtpPassword"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: tailscale
  hostname: docmost
  tags: ""

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5

resources: {}

reloader:
  enabled: true

postgres:
  enabled: true
  customUser:
    name: docmost
    database: docmost
    password: ""
  persistence:
    enabled: true
    size: 5Gi
