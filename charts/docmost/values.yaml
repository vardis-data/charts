# -- Image configuration
image:
  # -- Docmost image repository
  repository: docmost/docmost
  # -- Image tag
  # renovate: datasource=docker depName=docmost/docmost
  tag: "0.8.2"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Number of replicas
replicaCount: 1

# -- Application URL (required)
appUrl: ""

# -- Application secret (required) - used for session encryption
appSecret: ""

# -- Database configuration
database:
  # -- PostgreSQL host
  host: ""
  # -- PostgreSQL port
  port: 5432
  # -- Database name
  name: docmost
  # -- Database user
  user: docmost
  # -- Database password (required)
  password: ""

# -- Redis/Valkey configuration
redis:
  # -- Redis host
  host: ""
  # -- Redis port
  port: 6379
  # -- Redis password
  password: ""

# -- S3 storage configuration
s3:
  # -- Enable S3 storage
  enabled: false
  # -- S3 endpoint URL
  endpoint: ""
  # -- S3 region
  region: ""
  # -- S3 bucket name
  bucket: ""
  # -- S3 access key ID
  accessKeyId: ""
  # -- S3 secret access key
  secretAccessKey: ""
  # -- Force path style URLs
  forcePathStyle: true

# -- SMTP configuration
smtp:
  # -- Enable SMTP
  enabled: false
  # -- SMTP host
  host: ""
  # -- SMTP port
  port: 587
  # -- SMTP username
  username: ""
  # -- SMTP password
  password: ""
  # -- Enable TLS
  secure: true
  # -- From email address
  fromAddress: ""
  # -- From name
  fromName: "Docmost"

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80

# -- Liveness probe configuration
livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Initial delay seconds
  initialDelaySeconds: 30
  # -- Period seconds
  periodSeconds: 10

# -- Readiness probe configuration
readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Initial delay seconds
  initialDelaySeconds: 5
  # -- Period seconds
  periodSeconds: 5

# -- Resource limits and requests
resources: {}
