apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dozzle.fullname" . }}
  labels:
    {{- include "dozzle.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dozzle.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dozzle.selectorLabels" . | nindent 8 }}
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      serviceAccountName: {{ include "dozzle.fullname" . }}
      containers:
        - name: dozzle
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - "--mode"
            - {{ .Values.mode | quote }}
          env:
            - name: DOZZLE_NO_ANALYTICS
              value: "true"
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      restartPolicy: Always
