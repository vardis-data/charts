suite: clusterrole tests
templates:
  - templates/clusterrole.yaml
tests:
  - it: should render clusterrole
    asserts:
      - isKind:
          of: ClusterRole

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-dozzle

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: dozzle
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should allow reading pods and pod logs
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods", "pods/log"]
            verbs: ["get", "list", "watch"]

  - it: should allow reading namespaces
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["get", "list", "watch"]
