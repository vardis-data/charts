suite: clusterrolebinding tests
templates:
  - templates/clusterrolebinding.yaml
tests:
  - it: should render clusterrolebinding
    asserts:
      - isKind:
          of: ClusterRoleBinding

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-dozzle

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: dozzle
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should reference correct clusterrole
    asserts:
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: RELEASE-NAME-dozzle

  - it: should bind to dozzle serviceaccount
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-dozzle
            namespace: NAMESPACE

  - it: should use release namespace for serviceaccount
    release:
      namespace: dozzle
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: RELEASE-NAME-dozzle
            namespace: dozzle
