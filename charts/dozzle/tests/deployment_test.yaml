suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should render deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-dozzle

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "amir20/dozzle:v10.5.2"

  - it: should use custom image when specified
    set:
      image.repository: custom/dozzle
      image.tag: v99.0.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom/dozzle:v99.0.0"

  - it: should have correct container port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should set DOZZLE_MODE to k8s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DOZZLE_MODE
            value: "k8s"

  - it: should set DOZZLE_NO_ANALYTICS env var
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DOZZLE_NO_ANALYTICS
            value: "true"

  - it: should have liveness probe on /healthcheck
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthcheck
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http

  - it: should have readiness probe on /healthcheck
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /healthcheck
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http

  - it: should have default resources defined
    asserts:
      - exists:
          path: spec.template.spec.containers[0].resources

  - it: should reference dozzle service account
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-dozzle

  - it: should have reloader annotation when enabled
    set:
      reloader.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]
          value: "true"

  - it: should not have reloader annotation when disabled
    set:
      reloader.enabled: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations
