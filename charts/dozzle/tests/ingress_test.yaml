suite: ingress tests
templates:
  - templates/ingress.yaml
tests:
  - it: should not render ingress when tailscale disabled
    set:
      tailscale.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress when tailscale enabled
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
    asserts:
      - isKind:
          of: Ingress

  - it: should have correct name
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-dozzle

  - it: should use tailscale ingress class
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
    asserts:
      - equal:
          path: spec.ingressClassName
          value: tailscale

  - it: should set tailscale hostname annotation
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
    asserts:
      - equal:
          path: metadata.annotations["tailscale.com/hostname"]
          value: dozzle-test

  - it: should default tailscale tags from hostname
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
    asserts:
      - equal:
          path: metadata.annotations["tailscale.com/tags"]
          value: tag:k8s-dozzle-test

  - it: should use custom tags when specified
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
      tailscale.tags: "tag:custom"
    asserts:
      - equal:
          path: metadata.annotations["tailscale.com/tags"]
          value: "tag:custom"

  - it: should route to dozzle service on port 8080
    set:
      tailscale.enabled: true
      tailscale.hostname: dozzle-test
    asserts:
      - equal:
          path: spec.defaultBackend.service.name
          value: RELEASE-NAME-dozzle
      - equal:
          path: spec.defaultBackend.service.port.number
          value: 8080
