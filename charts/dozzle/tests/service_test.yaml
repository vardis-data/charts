suite: service tests
templates:
  - templates/service.yaml
tests:
  - it: should render service
    asserts:
      - isKind:
          of: Service

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-dozzle

  - it: should have correct port
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should allow custom service type
    set:
      service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort
