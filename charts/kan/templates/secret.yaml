apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kan.secretName" . }}
  labels:
    {{- include "kan.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.betterAuthSecret | quote }}
  POSTGRES_URL: {{ include "kan.databaseUrl" . | quote }}
  {{- if and .Values.smtp.enabled (not .Values.smtp.existingSecret.name) }}
  SMTP_PASSWORD: {{ .Values.smtp.password | quote }}
  {{- end }}
  {{- if and .Values.s3.enabled (not .Values.s3.existingSecret.name) }}
  S3_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | quote }}
  {{- end }}
