suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should render deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kan

  - it: should use correct image with default tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/kanbn/kan:latest"

  - it: should use custom image tag when specified
    set:
      image:
        tag: "v0.5.6"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/kanbn/kan:v0.5.6"

  - it: should use custom image repository when specified
    set:
      image:
        repository: "custom-registry.io/kan"
        tag: "custom-tag"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "custom-registry.io/kan:custom-tag"

  - it: should set base URL
    set:
      baseUrl: https://kan.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NEXT_PUBLIC_BASE_URL
            value: "https://kan.example.com"

  - it: should have reloader annotation by default
    asserts:
      - equal:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]
          value: "true"

  - it: should disable reloader annotation when configured
    set:
      reloader:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: should enable S3 when configured
    set:
      s3:
        enabled: true
        endpoint: https://s3.example.com
        region: us-east-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: S3_ENDPOINT
            value: "https://s3.example.com"

  - it: should enable SMTP when configured
    set:
      smtp:
        enabled: true
        host: smtp.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMTP_HOST
            value: "smtp.example.com"

  - it: should have default resources
    asserts:
      - exists:
          path: spec.template.spec.containers[0].resources

  - it: should mount data volume in main container when sqlite enabled
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should not have litestream sidecar by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should add litestream init container when enabled
    set:
      litestream:
        enabled: true
        image:
          repository: litestream/litestream
          tag: "0.5"
        s3:
          bucket: my-bucket
          path: kan/db.sqlite3
          endpoint: https://s3.example.com
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: litestream-restore
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "litestream/litestream:0.5"

  - it: should add litestream sidecar when enabled
    set:
      litestream:
        enabled: true
        image:
          repository: litestream/litestream
          tag: "0.5"
        s3:
          bucket: my-bucket
          path: kan/db.sqlite3
          endpoint: https://s3.example.com
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: litestream

  - it: should mount litestream config and data in sidecar
    set:
      litestream:
        enabled: true
        image:
          repository: litestream/litestream
          tag: "0.5"
        s3:
          bucket: my-bucket
          path: kan/db.sqlite3
          endpoint: https://s3.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.containers[1].volumeMounts
          content:
            name: litestream-config
            mountPath: /etc/litestream.yml
            subPath: litestream.yml
