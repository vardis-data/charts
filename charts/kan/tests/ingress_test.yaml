suite: ingress tests
templates:
  - templates/ingress.yaml
tests:
  - it: should not render ingress when tailscale disabled
    set:
      ingress.tailscale.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress when tailscale enabled
    set:
      ingress.tailscale.enabled: true
      ingress.tailscale.hostname: kan-test
    asserts:
      - isKind:
          of: Ingress

  - it: should have correct name
    set:
      ingress.tailscale.enabled: true
      ingress.tailscale.hostname: kan-test
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kan

  - it: should use tailscale ingress class
    set:
      ingress.tailscale.enabled: true
      ingress.tailscale.hostname: kan-test
    asserts:
      - equal:
          path: spec.ingressClassName
          value: tailscale

  - it: should set tailscale hostname annotation
    set:
      ingress.tailscale.enabled: true
      ingress.tailscale.hostname: kan-test
    asserts:
      - equal:
          path: metadata.annotations["tailscale.com/hostname"]
          value: kan-test

  - it: should default tailscale tags from hostname
    set:
      ingress.tailscale.enabled: true
      ingress.tailscale.hostname: kan-test
    asserts:
      - equal:
          path: metadata.annotations["tailscale.com/tags"]
          value: tag:k8s-kan-test

  - it: should route to kan service on port 3000
    set:
      ingress.tailscale.enabled: true
      ingress.tailscale.hostname: kan-test
    asserts:
      - equal:
          path: spec.defaultBackend.service.name
          value: RELEASE-NAME-kan
      - equal:
          path: spec.defaultBackend.service.port.number
          value: 3000
