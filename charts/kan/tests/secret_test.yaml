suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kan

  - it: should contain BETTER_AUTH_SECRET
    set:
      betterAuthSecret: my-secret
    asserts:
      - equal:
          path: stringData.BETTER_AUTH_SECRET
          value: "my-secret"

  - it: should generate POSTGRES_URL with embedded postgres
    set:
      postgres:
        enabled: true
        customUser:
          name: kan
          database: kan
          password: testpass
    asserts:
      - equal:
          path: stringData.POSTGRES_URL
          value: "postgresql://kan:testpass@RELEASE-NAME-postgres:5432/kan"

  - it: should contain S3 credentials when inline
    set:
      s3:
        enabled: true
        accessKeyId: my-key
        secretAccessKey: my-secret
    asserts:
      - equal:
          path: stringData.S3_ACCESS_KEY_ID
          value: "my-key"
      - equal:
          path: stringData.S3_SECRET_ACCESS_KEY
          value: "my-secret"

  - it: should not contain S3 credentials when using existing secret
    set:
      s3:
        enabled: true
        existingSecret:
          name: s3-credentials
    asserts:
      - notExists:
          path: stringData.S3_ACCESS_KEY_ID
      - notExists:
          path: stringData.S3_SECRET_ACCESS_KEY

  - it: should contain SMTP password when enabled
    set:
      smtp:
        enabled: true
        password: smtp-pass
    asserts:
      - equal:
          path: stringData.SMTP_PASSWORD
          value: "smtp-pass"
