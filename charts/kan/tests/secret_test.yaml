suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kan

  - it: should contain BETTER_AUTH_SECRET
    set:
      betterAuthSecret: my-secret
    asserts:
      - equal:
          path: stringData.BETTER_AUTH_SECRET
          value: "my-secret"

  - it: should not contain POSTGRES_URL when sqlite enabled
    asserts:
      - notExists:
          path: stringData.POSTGRES_URL

  - it: should contain S3 credentials when inline
    set:
      s3:
        enabled: true
        accessKeyId: my-key
        secretAccessKey: my-secret
    asserts:
      - equal:
          path: stringData.S3_ACCESS_KEY_ID
          value: "my-key"
      - equal:
          path: stringData.S3_SECRET_ACCESS_KEY
          value: "my-secret"

  - it: should not contain S3 credentials when using existing secret
    set:
      s3:
        enabled: true
        existingSecret:
          name: s3-credentials
    asserts:
      - notExists:
          path: stringData.S3_ACCESS_KEY_ID
      - notExists:
          path: stringData.S3_SECRET_ACCESS_KEY

  - it: should use database.url when sqlite disabled
    set:
      sqlite:
        enabled: false
      database:
        url: postgresql://neon.host/kan?sslmode=require
    asserts:
      - equal:
          path: stringData.POSTGRES_URL
          value: "postgresql://neon.host/kan?sslmode=require"

  - it: should construct POSTGRES_URL from individual fields when sqlite disabled
    set:
      sqlite:
        enabled: false
      database:
        host: external-db.example.com
        port: 5432
        name: kan
        user: kan_user
        password: secret123
    asserts:
      - equal:
          path: stringData.POSTGRES_URL
          value: "postgresql://kan_user:secret123@external-db.example.com:5432/kan"

  - it: should contain litestream credentials when enabled
    set:
      litestream:
        enabled: true
        s3:
          accessKeyId: ls-key
          secretAccessKey: ls-secret
    asserts:
      - equal:
          path: stringData.LITESTREAM_ACCESS_KEY_ID
          value: "ls-key"
      - equal:
          path: stringData.LITESTREAM_SECRET_ACCESS_KEY
          value: "ls-secret"

  - it: should not contain litestream credentials when disabled
    asserts:
      - notExists:
          path: stringData.LITESTREAM_ACCESS_KEY_ID
      - notExists:
          path: stringData.LITESTREAM_SECRET_ACCESS_KEY

  - it: should contain SMTP password when enabled
    set:
      smtp:
        enabled: true
        password: smtp-pass
    asserts:
      - equal:
          path: stringData.SMTP_PASSWORD
          value: "smtp-pass"
