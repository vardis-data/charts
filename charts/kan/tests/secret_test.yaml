suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should not render when existingSecret is enabled
    set:
      existingSecret:
        enabled: true
        name: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kan

  - it: should contain BETTER_AUTH_SECRET
    set:
      betterAuthSecret: my-secret
    asserts:
      - equal:
          path: stringData.BETTER_AUTH_SECRET
          value: "my-secret"

  - it: should generate POSTGRES_URL with embedded postgres
    set:
      postgres:
        enabled: true
        customUser:
          name: kan
          database: kan
          password: testpass
    asserts:
      - equal:
          path: stringData.POSTGRES_URL
          value: "postgresql://kan:testpass@RELEASE-NAME-postgres:5432/kan"

  - it: should generate POSTGRES_URL with external database
    set:
      postgres:
        enabled: false
      database:
        host: db.example.com
        port: 5432
        name: kan
        user: kan
        password: secret
    asserts:
      - equal:
          path: stringData.POSTGRES_URL
          value: "postgresql://kan:secret@db.example.com:5432/kan"

  - it: should contain S3 credentials when enabled
    set:
      s3:
        enabled: true
        accessKeyId: my-key
        secretAccessKey: my-secret
    asserts:
      - equal:
          path: stringData.S3_ACCESS_KEY_ID
          value: "my-key"
      - equal:
          path: stringData.S3_SECRET_ACCESS_KEY
          value: "my-secret"

  - it: should contain SMTP password when enabled
    set:
      smtp:
        enabled: true
        password: smtp-pass
    asserts:
      - equal:
          path: stringData.SMTP_PASSWORD
          value: "smtp-pass"
