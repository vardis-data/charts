# -- Image configuration
image:
  # -- Kan image repository
  repository: ghcr.io/kanbn/kan
  # -- Image tag
  # renovate: datasource=docker depName=ghcr.io/kanbn/kan
  tag: "0.8.1"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Number of replicas
replicaCount: 1

# -- Base URL for the application (required)
baseUrl: ""

# -- Better Auth secret (required) - used for session encryption
betterAuthSecret: ""

# -- External database configuration (used when postgres.enabled is false)
database:
  # -- PostgreSQL host
  host: ""
  # -- PostgreSQL port
  port: 5432
  # -- Database name
  name: kan
  # -- Database user
  user: kan
  # -- Database password (required)
  password: ""

# -- S3 storage configuration
s3:
  # -- Enable S3 storage
  enabled: false
  # -- S3 endpoint URL
  endpoint: ""
  # -- S3 region
  region: ""
  # -- S3 bucket name for avatars
  avatarBucket: ""
  # -- S3 access key ID
  accessKeyId: ""
  # -- S3 secret access key
  secretAccessKey: ""
  # -- Force path style URLs
  forcePathStyle: true

# -- SMTP configuration
smtp:
  # -- Enable SMTP
  enabled: false
  # -- SMTP host
  host: ""
  # -- SMTP port
  port: 587
  # -- SMTP username
  username: ""
  # -- SMTP password
  password: ""
  # -- Enable TLS
  secure: true
  # -- From email address
  fromAddress: ""

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 3000

# -- Resource limits and requests
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Enable reloader annotation for automatic restarts on secret changes
reloader:
  enabled: true

# -- Embedded PostgreSQL configuration (cloudpirates/postgres subchart)
postgres:
  # -- Enable embedded PostgreSQL
  enabled: true
  # -- Custom user configuration for Kan database
  customUser:
    name: kan
    database: kan
    password: ""
  # -- Persistence configuration
  persistence:
    enabled: true
    size: 1Gi
