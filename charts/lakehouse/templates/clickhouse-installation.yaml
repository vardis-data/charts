{{- if .Values.clickhouse.enabled }}
apiVersion: "clickhouse.altinity.com/v1"
kind: ClickHouseInstallation
metadata:
  name: {{ include "lakehouse.fullname" . }}
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  defaults:
    templates:
      podTemplate: clickhouse-pod
      dataVolumeClaimTemplate: clickhouse-data
  configuration:
    clusters:
      - name: vardis
        layout:
          shardsCount: 1
          replicasCount: 1
    users:
      {{ .Values.clickhouse.user }}/password_env_name: CLICKHOUSE_PASSWORD
      {{ .Values.clickhouse.user }}/networks/ip:
        - "0.0.0.0/0"
        - "::/0"
      {{ .Values.clickhouse.user }}/profile: default
      {{ .Values.clickhouse.user }}/quota: default
    settings:
      max_server_memory_usage: {{ .Values.clickhouse.maxServerMemoryUsage | quote }}
    files:
      config.d/storage.xml: |
        <clickhouse>
          <storage_configuration>
            <disks>
              <s3>
                <type>s3</type>
                <endpoint>{{ .Values.s3.endpoint }}/{{ .Values.s3.bucket }}/clickhouse/</endpoint>
                <access_key_id from_env="S3_ACCESS_KEY_ID"/>
                <secret_access_key from_env="S3_SECRET_ACCESS_KEY"/>
                <region>{{ .Values.s3.region }}</region>
                <use_environment_credentials>false</use_environment_credentials>
              </s3>
            </disks>
            <policies>
              <s3_only>
                <volumes>
                  <main>
                    <disk>s3</disk>
                  </main>
                </volumes>
              </s3_only>
            </policies>
          </storage_configuration>
        </clickhouse>
  templates:
    podTemplates:
      - name: clickhouse-pod
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: clickhouse
              image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
              imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
              env:
                - name: CLICKHOUSE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "lakehouse.clickhouse.secretName" . }}
                      key: {{ include "lakehouse.clickhouse.secretKey" . }}
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "lakehouse.s3.secretName" . }}
                      key: {{ include "lakehouse.s3.accessKeyIdKey" . }}
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "lakehouse.s3.secretName" . }}
                      key: {{ include "lakehouse.s3.secretAccessKeyKey" . }}
              {{- with .Values.clickhouse.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
    volumeClaimTemplates:
      - name: clickhouse-data
        spec:
          accessModes:
            - ReadWriteOnce
          {{- with .Values.clickhouse.persistence.storageClass }}
          storageClassName: {{ . }}
          {{- end }}
          resources:
            requests:
              storage: {{ .Values.clickhouse.persistence.size }}
{{- end }}
