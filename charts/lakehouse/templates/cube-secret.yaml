{{- if .Values.cube.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lakehouse.fullname" . }}-cube
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube
type: Opaque
stringData:
  jwt-secret: {{ .Values.cube.jwt.secret | default (randAlphaNum 64) | quote }}
{{- end }}
