apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lakehouse.fullname" . }}-replicas
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    lakehouse/role: replica
spec:
  replicas: {{ .Values.replicas.minReplicas }}
  selector:
    matchLabels:
      {{- include "lakehouse.selectorLabels" . | nindent 6 }}
      lakehouse/role: replica
  template:
    metadata:
      labels:
        {{- include "lakehouse.selectorLabels" . | nindent 8 }}
        lakehouse/role: replica
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      {{- if or .Values.scheduling.replicas.antiAffinity.enabled .Values.scheduling.replicas.topologySpread.enabled }}
      {{- if .Values.scheduling.replicas.antiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.scheduling.replicas.antiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "lakehouse.selectorLabels" . | nindent 20 }}
                    lakehouse/role: replica
                topologyKey: {{ .Values.scheduling.replicas.antiAffinity.topologyKey }}
      {{- end }}
      {{- if .Values.scheduling.replicas.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.scheduling.replicas.topologySpread.maxSkew }}
          topologyKey: {{ .Values.scheduling.replicas.topologySpread.topologyKey }}
          whenUnsatisfiable: {{ .Values.scheduling.replicas.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "lakehouse.selectorLabels" . | nindent 14 }}
              lakehouse/role: replica
      {{- end }}
      {{- end }}
      initContainers:
        - name: wait-for-primary
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              until pg_isready -h {{ include "lakehouse.fullname" . }} -U {{ .Values.postgres.user }}; do
                echo "Waiting for primary..."
                sleep 5
              done
        - name: init-replica
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              if [ ! -s "$PGDATA/PG_VERSION" ]; then
                PGPASSWORD="$POSTGRES_PASSWORD" pg_basebackup \
                  -h {{ include "lakehouse.fullname" . }} \
                  -U {{ .Values.postgres.user }} \
                  -D "$PGDATA" \
                  -Fp -Xs -P -R
              fi
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lakehouse.passwordSecretName" . }}
                  key: {{ include "lakehouse.passwordKey" . }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            {{- include "lakehouse.volumeMounts" . | nindent 12 }}
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["docker-entrypoint.sh", "postgres"]
          args:
            {{- include "lakehouse.preloadArgs" . | nindent 12 }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.port }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            {{- include "lakehouse.env" . | nindent 12 }}
          volumeMounts:
            {{- include "lakehouse.volumeMounts" . | nindent 12 }}
          {{- include "lakehouse.probes" . | nindent 10 }}
          {{- with .Values.replicas.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.metrics.enabled }}
        {{- include "lakehouse.exporter" . | nindent 8 }}
        {{- end }}
      volumes:
        - name: data
          emptyDir: {}
