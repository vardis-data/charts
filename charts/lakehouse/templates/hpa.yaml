apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "lakehouse.fullname" . }}-replicas
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "lakehouse.fullname" . }}-replicas
  minReplicas: {{ .Values.replicas.minReplicas }}
  maxReplicas: {{ .Values.replicas.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.replicas.targetCPUUtilizationPercentage }}
