{{- if and .Values.extensions.hook.enabled (or .Values.extensions.install .Values.extensions.sharedPreloadLibraries) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lakehouse.fullname" . }}-manage-extensions
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "lakehouse.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manage-extensions
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -e

              echo "Waiting for primary to accept connections..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do
                sleep 3
              done

              echo "Waiting for database '$PGDATABASE' to exist (initdb may still be running)..."
              until psql -v ON_ERROR_STOP=1 -c "SELECT 1" > /dev/null 2>&1; do
                sleep 3
              done

              {{- if has "pg_cron" .Values.extensions.sharedPreloadLibraries }}
              psql -v ON_ERROR_STOP=1 -c "ALTER SYSTEM SET cron.database_name = '$PGDATABASE';"
              {{- end }}

              {{- range .Values.extensions.install }}
              psql -v ON_ERROR_STOP=1 -d "$PGDATABASE" -c "CREATE EXTENSION IF NOT EXISTS {{ . }};"
              {{- end }}

              psql -v ON_ERROR_STOP=1 -c "SELECT pg_reload_conf();"

              echo "Extension management complete."
          env:
            - name: PGHOST
              value: {{ include "lakehouse.fullname" . }}
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lakehouse.passwordSecretName" . }}
                  key: {{ include "lakehouse.passwordKey" . }}
{{- end }}
