{{- if .Values.metadata.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lakehouse.fullname" . }}-metadata
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: metadata
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    {{- include "lakehouse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: metadata
{{- end }}
