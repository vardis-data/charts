apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lakehouse.fullname" . }}-nessie
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    lakehouse/component: nessie
spec:
  {{- if not .Values.nessie.autoscaling.enabled }}
  replicas: {{ .Values.nessie.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "lakehouse.selectorLabels" . | nindent 6 }}
      lakehouse/component: nessie
  template:
    metadata:
      labels:
        {{- include "lakehouse.selectorLabels" . | nindent 8 }}
        lakehouse/component: nessie
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/search: "true"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              until pg_isready -h {{ include "lakehouse.metadata.host" . }} -U {{ .Values.nessie.postgres.user }}; do
                echo "Waiting for metadata postgres..."
                sleep 5
              done
      containers:
        - name: nessie
          image: "{{ .Values.nessie.image.repository }}:{{ .Values.nessie.image.tag }}"
          imagePullPolicy: {{ .Values.nessie.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.nessie.port }}
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP
          env:
            - name: NESSIE_VERSION_STORE_TYPE
              value: JDBC
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: {{ include "lakehouse.nessie.jdbcUrl" . | quote }}
            - name: QUARKUS_DATASOURCE_USERNAME
              value: {{ .Values.nessie.postgres.user | quote }}
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lakehouse.nessiePasswordSecretName" . | quote }}
                  key: {{ include "lakehouse.nessiePasswordKey" . | quote }}
            - name: NESSIE_DEFAULT_BRANCH
              value: {{ .Values.nessie.defaultBranch | quote }}
            - name: NESSIE_CATALOG_DEFAULT_WAREHOUSE
              value: {{ .Values.nessie.warehouseName | quote }}
            {{- include "lakehouse.nessieExtraEnv" . | indent 12 }}
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: management
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- with .Values.nessie.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
