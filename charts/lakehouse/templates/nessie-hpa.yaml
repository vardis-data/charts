{{- if .Values.nessie.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "lakehouse.fullname" . }}-nessie
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    lakehouse/component: nessie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "lakehouse.fullname" . }}-nessie
  minReplicas: {{ .Values.nessie.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.nessie.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.nessie.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.nessie.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.nessie.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
