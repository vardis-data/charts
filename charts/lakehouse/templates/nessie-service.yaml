apiVersion: v1
kind: Service
metadata:
  name: {{ include "lakehouse.fullname" . }}-nessie
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    lakehouse/component: nessie
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.nessie.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "lakehouse.selectorLabels" . | nindent 4 }}
    lakehouse/component: nessie
