{{- if .Values.postgrest.enabled }}
{{- $authenticatorPassword := "" }}
{{- if .Values.postgrest.authenticatorPassword }}
{{- $authenticatorPassword = .Values.postgrest.authenticatorPassword }}
{{- else }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (printf "%s-postgrest" (include "lakehouse.fullname" .)) }}
{{- if $secret }}
{{- $authenticatorPassword = index $secret.data "authenticator-password" | b64dec }}
{{- else }}
{{- $authenticatorPassword = randAlphaNum 32 }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lakehouse.fullname" . }}-postgrest
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
type: Opaque
stringData:
  authenticator-password: {{ $authenticatorPassword | quote }}
  db-uri: {{ printf "postgres://authenticator:%s@%s-replicas:%d/%s" $authenticatorPassword (include "lakehouse.fullname" .) (.Values.postgres.port | int) .Values.postgres.database | quote }}
  {{- if and .Values.postgrest.jwt.enabled (not .Values.postgrest.jwt.existingSecret.name) }}
  jwt-secret: {{ .Values.postgrest.jwt.secret | default (randAlphaNum 64) | quote }}
  {{- end }}
{{- end }}
