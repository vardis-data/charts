{{- if .Values.postgrest.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lakehouse.fullname" . }}-postgrest
  labels:
    {{- include "lakehouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
spec:
  type: {{ .Values.postgrest.service.type }}
  ports:
    - port: {{ .Values.postgrest.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: admin
  selector:
    {{- include "lakehouse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
{{- end }}
