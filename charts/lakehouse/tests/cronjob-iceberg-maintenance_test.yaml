suite: iceberg maintenance cronjob tests
templates:
  - templates/cronjob-iceberg-maintenance.yaml
tests:
  - it: should render cronjob
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakehouse-iceberg-maintenance

  - it: should have correct schedule
    asserts:
      - equal:
          path: spec.schedule
          value: "0 3 * * 0"

  - it: should use correct image
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/iceberg-maintenance:main"

  - it: should set Nessie URI env
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: ICEBERG_NESSIE_URI
            value: "http://RELEASE-NAME-lakehouse-nessie:19120"

  - it: should set retention days
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: ICEBERG_RETENTION_DAYS
            value: "30"

  - it: should set dry run from values
    set:
      maintenance:
        iceberg:
          dryRun: "true"
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: ICEBERG_DRY_RUN
            value: "true"

  - it: should set S3 path style from values
    set:
      s3:
        urlStyle: path
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: ICEBERG_S3_PATH_STYLE
            value: "true"

  - it: should read S3 credentials from existing secret
    set:
      s3:
        existingSecret:
          name: my-s3-secret
          keys:
            accessKeyId: my-key
            secretAccessKey: my-secret-key
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: ICEBERG_S3_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: my-s3-secret
                key: my-key

  - it: should set resource limits
    asserts:
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.limits
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests

  - it: should not render when disabled
    set:
      maintenance:
        iceberg:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
