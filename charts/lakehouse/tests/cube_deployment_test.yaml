suite: cube deployment tests
templates:
  - templates/cube-deployment.yaml
tests:
  - it: should render cube deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct cube deployment name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakehouse-cube

  - it: should not render when cube is disabled
    set:
      cube:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use clickhouse as db type
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUBEJS_DB_TYPE
            value: clickhouse

  - it: should connect to clickhouse on port 8123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUBEJS_DB_PORT
            value: "8123"

  - it: should set clickhouse host to chi service name
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUBEJS_DB_HOST
            value: clickhouse-RELEASE-NAME-lakehouse

  - it: should have no initContainers by default
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: should render init-databases container when databases are set
    set:
      clickhouse:
        databases:
          - prod
          - vardis
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-databases

  - it: should use clickhouse-server image for init container
    set:
      clickhouse:
        databases:
          - prod
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].image
          pattern: clickhouse/clickhouse-server

  - it: should pass clickhouse password to init container
    set:
      clickhouse:
        databases:
          - prod
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-lakehouse-clickhouse
                key: password

  - it: should enable scheduled refresh timer
    set:
      cube:
        scheduledRefreshTimer: "true"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUBEJS_SCHEDULED_REFRESH_TIMER
            value: "true"

  - it: should set pre-aggregations schema
    set:
      cube:
        preAggregationsSchema: prod_pre_aggs
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUBEJS_PRE_AGGREGATIONS_SCHEMA
            value: prod_pre_aggs

  - it: should set scheduled refresh timezones
    set:
      cube:
        scheduledRefreshTimezones: America/Sao_Paulo
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUBEJS_SCHEDULED_REFRESH_TIMEZONES
            value: America/Sao_Paulo
