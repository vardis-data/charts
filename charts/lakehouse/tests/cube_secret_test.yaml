suite: cube secret tests
templates:
  - templates/cube-secret.yaml
tests:
  - it: should render secret when cube is enabled
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakehouse-cube

  - it: should always contain jwt-secret key
    asserts:
      - exists:
          path: stringData["jwt-secret"]

  - it: should use provided jwt secret
    set:
      cube:
        jwt:
          secret: "my-static-secret"
    asserts:
      - equal:
          path: stringData["jwt-secret"]
          value: "my-static-secret"

  - it: should not render when cube is disabled
    set:
      cube:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
