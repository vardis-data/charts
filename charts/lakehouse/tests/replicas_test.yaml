suite: replicas tests
templates:
  - templates/deployment-replicas.yaml
tests:
  - it: should render replicas deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakehouse-replicas

  - it: should have replica role label
    asserts:
      - equal:
          path: spec.template.metadata.labels["lakehouse/role"]
          value: replica

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pg-duckdb:main"

  - it: should have default replica count
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should have wait-for-primary init container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-primary

  - it: should have init-replica init container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: init-replica

  - it: should use emptyDir for replica data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should have probes
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe
      - exists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should have anti-affinity by default
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity

  - it: should have topology spread by default
    asserts:
      - exists:
          path: spec.template.spec.topologySpreadConstraints
