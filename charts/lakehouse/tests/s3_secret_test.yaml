suite: s3 secret tests
templates:
  - templates/s3-secret.yaml
tests:
  - it: should not render when existingSecret is set
    set:
      s3:
        existingSecret:
          name: my-s3-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when no credentials provided
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret with inline credentials
    set:
      s3:
        accessKeyId: "test-access-key-id"
        secretAccessKey: "test-secret-access-key"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakehouse-s3
      - equal:
          path: stringData.s3AccessKeyId
          value: "test-access-key-id"
      - equal:
          path: stringData.s3SecretAccessKey
          value: "test-secret-access-key"
