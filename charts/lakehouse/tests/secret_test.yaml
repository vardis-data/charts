suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret when no existingSecret set
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-lakehouse

  - it: should contain password key
    asserts:
      - exists:
          path: data.password

  - it: should contain nessie-password key
    asserts:
      - exists:
          path: data["nessie-password"]

  - it: should not render secret when passwordSecret.name is set
    set:
      postgres:
        passwordSecret:
          name: my-secret
          key: my-key
    asserts:
      - hasDocuments:
          count: 0

  - it: should contain S3 keys when inline credentials given
    set:
      s3:
        accessKeyId: test-key
        secretAccessKey: test-secret
    asserts:
      - exists:
          path: data.s3AccessKeyId
      - exists:
          path: data.s3SecretAccessKey

  - it: should not contain S3 keys when existingSecret used
    set:
      s3:
        existingSecret:
          name: s3-credentials
    asserts:
      - notExists:
          path: data.s3AccessKeyId
