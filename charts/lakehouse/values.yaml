# -- ClickHouse: query engine and storage layer.
# Deployed via Altinity clickhouse-operator ClickHouseInstallation CRD.
# Requires the clickhouse-operator to be installed cluster-wide first.
clickhouse:
  enabled: true
  image:
    repository: clickhouse/clickhouse-server
    # renovate: datasource=docker depName=clickhouse/clickhouse-server
    tag: "25.5"
    pullPolicy: IfNotPresent
  # -- ClickHouse default user name
  user: vardis
  # -- Default query database for Cube
  database: prod
  # -- ClickHouse password (ignored when existingSecret.name is set)
  password: ""
  # -- Reference an existing Secret for the ClickHouse password
  existingSecret:
    name: ""
    key: "password"
  # -- Hard memory cap in bytes (default: 12GB = 12884901888)
  maxServerMemoryUsage: "12884901888"
  persistence:
    # -- Local PVC size for metadata and merge tmp (data lives on S3)
    size: 20Gi
    storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 12Gi

# -- S3-compatible object storage used as ClickHouse S3 disk.
s3:
  # -- S3 endpoint hostname (e.g. "nbg1.your-objectstorage.com")
  endpoint: ""
  # -- S3 region (e.g. "nbg1", "us-east-1")
  region: ""
  # -- Bucket name for ClickHouse data
  bucket: ""
  # -- S3 access key ID (ignored when existingSecret.name is set)
  accessKeyId: ""
  # -- S3 secret access key (ignored when existingSecret.name is set)
  secretAccessKey: ""
  # -- Reference an existing Secret for S3 credentials
  existingSecret:
    name: ""
    keys:
      accessKeyId: "s3AccessKeyId"
      secretAccessKey: "s3SecretAccessKey"

# -- Cube: semantic layer with REST API (:4000) and SQL API (:15432).
# Connects to ClickHouse as its database backend.
cube:
  enabled: true
  image:
    repository: cubejs/cube
    # renovate: datasource=docker depName=cubejs/cube
    tag: "v0.36.11"
    pullPolicy: IfNotPresent
  replicas: 1
  jwt:
    secret: ""
    jwksUrl: ""
    audience: ""
    issuer: ""
  cache:
    driver: memory
    external: "false"
    externalToCubeJS: "false"
  refreshWorker: "true"
  scheduledRefreshTimer: "false"
  # -- Pre-aggregations schema in ClickHouse
  preAggregationsSchema: ""
  # -- Timezone for scheduled refresh (e.g. "America/Sao_Paulo")
  scheduledRefreshTimezones: ""
  model:
    cubes.yaml: |
      cubes:
        - name: example
          sql: SELECT 1 AS value
          measures:
            - name: count
              sql: value
              type: count
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# -- Optional image pull secrets for private registries
imagePullSecrets: []

# -- Extra labels applied to all resources
commonLabels: {}

# -- Stakater Reloader: auto-restart pods on ConfigMap/Secret changes
reloader:
  enabled: true
