{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nginx-s3-gateway.fullname" . }}
  labels:
    {{- include "nginx-s3-gateway.labels" . | nindent 4 }}
  annotations:
    tailscale.com/hostname: {{ .Values.ingress.hostname }}
    tailscale.com/tags: {{ .Values.ingress.tags | default (printf "tag:k8s-%s" .Values.ingress.hostname) }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  defaultBackend:
    service:
      name: {{ include "nginx-s3-gateway.fullname" . }}
      port:
        number: {{ .Values.service.port }}
{{- end }}
