suite: nginx-s3-gateway tests
templates:
  - templates/deployment.yaml
tests:
  - it: should render deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nginx-s3-gateway
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginxinc/nginx-s3-gateway:latest"

  - it: should have correct container port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should respect replica count
    set:
      replicaCount: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2
