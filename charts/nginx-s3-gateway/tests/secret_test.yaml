suite: nginx-s3-gateway tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret when access key is set
    set:
      s3:
        accessKey: test-key
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-nginx-s3-gateway

  - it: should not render secret when access key is empty
    asserts:
      - hasDocuments:
          count: 0
