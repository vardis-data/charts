apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-init
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
data:
  00-init.sql: |
    CREATE EXTENSION IF NOT EXISTS pg_duckdb;

    ALTER SYSTEM SET duckdb.memory_limit = '{{ .Values.duckdb.primary.memoryLimit }}';
    ALTER SYSTEM SET duckdb.threads = {{ .Values.duckdb.primary.threads }};
    ALTER SYSTEM SET duckdb.force_execution = {{ .Values.duckdb.forceExecution }};
    SELECT pg_reload_conf();

  {{- if or .Values.s3.accessKeyId .Values.s3.existingSecret.name }}
  01-s3-secret.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      SELECT duckdb.create_simple_secret(
        type := 'S3',
        key_id := '$S3_ACCESS_KEY_ID',
        secret := '$S3_SECRET_ACCESS_KEY',
        region := '{{ .Values.s3.region }}'
        {{- if .Values.s3.endpoint }}
        , endpoint := '{{ .Values.s3.endpoint }}'
        {{- end }}
      );
    EOSQL
  {{- end }}

  02-replication.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      ALTER SYSTEM SET wal_level = 'replica';
      ALTER SYSTEM SET max_wal_senders = {{ add .Values.replicas.maxReplicas 2 }};
      ALTER SYSTEM SET hot_standby = on;
    EOSQL

    echo "host replication {{ .Values.postgres.user }} 0.0.0.0/0 md5" >> "$PGDATA/pg_hba.conf"
