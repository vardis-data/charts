{{- if and .Values.extensions.hook.enabled (or .Values.extensions.install .Values.extensions.sharedPreloadLibraries) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-manage-extensions
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "pg-duckdb.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manage-extensions
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -e

              until pg_isready -h "$PGHOST" -U "$PGUSER"; do
                echo "Waiting for database..."
                sleep 3
              done

              {{- $libs := prepend .Values.extensions.sharedPreloadLibraries "pg_duckdb" | uniq }}
              psql -v ON_ERROR_STOP=1 -c "ALTER SYSTEM SET shared_preload_libraries = {{ join "," $libs }};"

              {{- if has "pg_cron" .Values.extensions.sharedPreloadLibraries }}
              # Set cron.database_name only if pg_cron is already loaded (i.e. after a restart).
              # If not yet loaded this is a no-op; the setting is already written to
              # postgresql.auto.conf by 00-init.sql and will take effect after the next restart.
              psql -c "DO \$\$
              BEGIN
                IF EXISTS (SELECT 1 FROM pg_settings WHERE name = 'cron.database_name') THEN
                  EXECUTE 'ALTER SYSTEM SET cron.database_name = ''$PGDATABASE''';
                END IF;
              END
              \$\$;"
              {{- end }}

              {{- range .Values.extensions.install }}
              {{- if has . $.Values.extensions.sharedPreloadLibraries }}
              # {{ . }} requires shared_preload_libraries; only create if already loaded.
              psql -d "$PGDATABASE" -c "DO \$\$
              BEGIN
                IF EXISTS (SELECT 1 FROM pg_settings WHERE name = 'shared_preload_libraries'
                           AND setting LIKE '%{{ . }}%') THEN
                  CREATE EXTENSION IF NOT EXISTS {{ . }};
                ELSE
                  RAISE NOTICE 'Skipping {{ . }}: not yet in shared_preload_libraries (restart required)';
                END IF;
              END
              \$\$;"
              {{- else }}
              psql -v ON_ERROR_STOP=1 -d "$PGDATABASE" -c "CREATE EXTENSION IF NOT EXISTS {{ . }};"
              {{- end }}
              {{- end }}

              psql -v ON_ERROR_STOP=1 -c "SELECT pg_reload_conf();"

              echo "Extension management complete."
          env:
            - name: PGHOST
              value: {{ include "pg-duckdb.fullname" . }}
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg-duckdb.passwordSecretName" . }}
                  key: {{ include "pg-duckdb.passwordKey" . }}
{{- end }}
