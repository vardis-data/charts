{{- if .Values.postgres.readOnlyUsers }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-manage-users
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "pg-duckdb.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: manage-users
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -e

              until pg_isready -h "$PGHOST" -U "$PGUSER"; do
                echo "Waiting for database..."
                sleep 3
              done

              MANAGED_PREFIX="ro_"
              DESIRED_USERS="{{ range $i, $user := .Values.postgres.readOnlyUsers }}{{ if $i }} {{ end }}{{ $user.name }}{{ end }}"

              for username in $DESIRED_USERS; do
                password_var="RO_PASSWORD_$(echo "$username" | tr '[:lower:]' '[:upper:]')"
                password=$(printenv "$password_var")

                existing=$(psql -tAc "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '$username'" 2>/dev/null || echo "")

                if [ "$existing" = "1" ]; then
                  echo "Updating password for user: $username"
                  psql <<EOSQL
ALTER ROLE "$username" WITH LOGIN ENCRYPTED PASSWORD '$password';
GRANT CONNECT ON DATABASE $PGDATABASE TO "$username";
EOSQL
                else
                  echo "Creating user: $username"
                  psql <<EOSQL
CREATE ROLE "$username" WITH LOGIN ENCRYPTED PASSWORD '$password';
GRANT CONNECT ON DATABASE $PGDATABASE TO "$username";
EOSQL
                fi

                psql -tAc "
                  SELECT n.nspname
                  FROM pg_namespace n
                  JOIN (
                    SELECT nspacl.grantee
                    FROM pg_namespace,
                    LATERAL aclexplode(nspacl) AS nspacl
                    WHERE nspacl.privilege_type = 'USAGE'
                  ) a ON true
                  JOIN pg_roles r ON r.oid = a.grantee
                  WHERE r.rolname = '$username'
                    AND n.nspname NOT IN ('pg_catalog', 'information_schema', 'pg_toast')
                " 2>/dev/null | while read -r old_schema; do
                  if [ -n "$old_schema" ]; then
                    echo "Revoking access on schema: $old_schema for user: $username"
                    psql -c "REVOKE ALL ON SCHEMA \"$old_schema\" FROM \"$username\";" 2>/dev/null || true
                    psql -c "REVOKE ALL ON ALL TABLES IN SCHEMA \"$old_schema\" FROM \"$username\";" 2>/dev/null || true
                    psql -c "ALTER DEFAULT PRIVILEGES IN SCHEMA \"$old_schema\" REVOKE SELECT ON TABLES FROM \"$username\";" 2>/dev/null || true
                  fi
                done
              done

              {{- range $user := .Values.postgres.readOnlyUsers }}
              {{- range $schema := $user.schemas }}

              echo "Granting {{ $user.name }} access to schema: {{ $schema }}"
              psql -c "CREATE SCHEMA IF NOT EXISTS \"{{ $schema }}\";"
              psql -c "GRANT USAGE ON SCHEMA \"{{ $schema }}\" TO \"{{ $user.name }}\";"
              psql -c "GRANT SELECT ON ALL TABLES IN SCHEMA \"{{ $schema }}\" TO \"{{ $user.name }}\";"
              psql -c "ALTER DEFAULT PRIVILEGES IN SCHEMA \"{{ $schema }}\" GRANT SELECT ON TABLES TO \"{{ $user.name }}\";"
              {{- end }}
              {{- end }}

              current_roles=$(psql -tAc "SELECT rolname FROM pg_catalog.pg_roles WHERE rolname NOT IN ('$PGUSER', 'pg_signal_backend', 'pg_read_all_settings', 'pg_read_all_stats', 'pg_stat_scan_tables', 'pg_monitor', 'pg_read_server_files', 'pg_write_server_files', 'pg_execute_server_program', 'pg_checkpoint', 'pg_maintain', 'pg_create_subscription', 'pg_use_reserved_connections') AND rolcanlogin = true AND rolsuper = false AND rolreplication = false")

              for role in $current_roles; do
                is_desired=false
                for desired in $DESIRED_USERS; do
                  if [ "$role" = "$desired" ]; then
                    is_desired=true
                    break
                  fi
                done

                if [ "$is_desired" = "false" ]; then
                  echo "Removing unmanaged user: $role"
                  psql -c "REVOKE ALL PRIVILEGES ON DATABASE $PGDATABASE FROM \"$role\";" 2>/dev/null || true
                  psql -tAc "SELECT schema_name FROM information_schema.schemata WHERE schema_name NOT IN ('pg_catalog', 'information_schema', 'pg_toast')" | while read -r s; do
                    if [ -n "$s" ]; then
                      psql -c "REVOKE ALL ON SCHEMA \"$s\" FROM \"$role\";" 2>/dev/null || true
                      psql -c "REVOKE ALL ON ALL TABLES IN SCHEMA \"$s\" FROM \"$role\";" 2>/dev/null || true
                      psql -c "ALTER DEFAULT PRIVILEGES IN SCHEMA \"$s\" REVOKE SELECT ON TABLES FROM \"$role\";" 2>/dev/null || true
                    fi
                  done
                  psql -c "DROP ROLE IF EXISTS \"$role\";"
                fi
              done

              echo "User management complete."
          env:
            - name: PGHOST
              value: {{ include "pg-duckdb.fullname" . }}
            - name: PGPORT
              value: {{ .Values.postgres.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg-duckdb.passwordSecretName" . }}
                  key: {{ include "pg-duckdb.passwordKey" . }}
            {{- range $user := .Values.postgres.readOnlyUsers }}
            - name: RO_PASSWORD_{{ $user.name | upper }}
              valueFrom:
                secretKeyRef:
                  name: {{ $user.passwordSecret.name }}
                  key: {{ $user.passwordSecret.key }}
            {{- end }}
{{- end }}
