{{- if .Values.pdb.replicas.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-replicas
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.replicas.minAvailable }}
  selector:
    matchLabels:
      {{- include "pg-duckdb.selectorLabels" . | nindent 6 }}
      pg-duckdb/role: replica
{{- end }}
