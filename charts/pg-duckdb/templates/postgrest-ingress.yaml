{{- if and .Values.postgrest.enabled .Values.postgrest.ingress.enabled }}
{{- if eq .Values.postgrest.ingress.className "tailscale" }}
{{- $tailscaleValues := merge . (dict "Values" (merge .Values (dict "tailscale" (dict "enabled" true "hostname" .Values.postgrest.ingress.hostname "tags" .Values.postgrest.ingress.tags) "service" (dict "port" .Values.postgrest.service.port)))) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-postgrest
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
  annotations:
    tailscale.com/hostname: {{ .Values.postgrest.ingress.hostname | required ".Values.postgrest.ingress.hostname is required when tailscale ingress is enabled" }}
    tailscale.com/tags: {{ .Values.postgrest.ingress.tags | default (printf "tag:k8s-%s" .Values.postgrest.ingress.hostname) }}
    {{- with .Values.postgrest.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: {{ include "pg-duckdb.fullname" . }}-postgrest
      port:
        number: {{ .Values.postgrest.service.port }}
{{- else }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-postgrest
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
  {{- with .Values.postgrest.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.postgrest.ingress.className }}
  ingressClassName: {{ .Values.postgrest.ingress.className }}
  {{- end }}
  {{- if .Values.postgrest.ingress.tls }}
  tls:
    {{- range .Values.postgrest.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.postgrest.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "pg-duckdb.fullname" $ }}-postgrest
                port:
                  number: {{ $.Values.postgrest.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
