{{- if .Values.postgrest.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-postgrest
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
type: Opaque
data:
  anon-role-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- if and .Values.postgrest.jwt.enabled (not .Values.postgrest.jwt.existingSecret.name) }}
  jwt-secret: {{ .Values.postgrest.jwt.secret | default (randAlphaNum 64) | b64enc | quote }}
  {{- end }}
{{- end }}
