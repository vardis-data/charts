{{- if .Values.postgrest.enabled }}
{{- $authenticatorPassword := "" }}
{{- $anonPassword := "" }}
{{- if .Values.postgrest.authenticatorPassword }}
{{- $authenticatorPassword = .Values.postgrest.authenticatorPassword }}
{{- $anonPassword = randAlphaNum 32 }}
{{- else }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (printf "%s-postgrest" (include "pg-duckdb.fullname" .)) }}
{{- if $secret }}
{{- $authenticatorPassword = index $secret.data "authenticator-password" | b64dec }}
{{- $anonPassword = index $secret.data "anon-role-password" | b64dec }}
{{- else }}
{{- $authenticatorPassword = randAlphaNum 32 }}
{{- $anonPassword = randAlphaNum 32 }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg-duckdb.fullname" . }}-postgrest
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgrest
type: Opaque
stringData:
  anon-role-password: {{ $anonPassword | quote }}
  authenticator-password: {{ $authenticatorPassword | quote }}
  db-uri: {{ printf "postgres://authenticator:%s@%s-replicas:%d/%s" $authenticatorPassword (include "pg-duckdb.fullname" .) (.Values.postgres.port | int) .Values.postgres.database | quote }}
  {{- if and .Values.postgrest.jwt.enabled (not .Values.postgrest.jwt.existingSecret.name) }}
  jwt-secret: {{ .Values.postgrest.jwt.secret | default (randAlphaNum 64) | quote }}
  {{- end }}
{{- end }}
