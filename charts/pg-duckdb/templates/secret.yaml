{{- if not .Values.existingSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg-duckdb.fullname" . }}
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
  {{- if .Values.s3.accessKeyId }}
  s3AccessKeyId: {{ .Values.s3.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.s3.secretAccessKey }}
  s3SecretAccessKey: {{ .Values.s3.secretAccessKey | quote }}
  {{- end }}
{{- end }}
