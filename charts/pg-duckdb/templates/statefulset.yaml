apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pg-duckdb.fullname" . }}
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
    pg-duckdb/role: primary
spec:
  replicas: 1
  serviceName: {{ include "pg-duckdb.fullname" . }}
  selector:
    matchLabels:
      {{- include "pg-duckdb.selectorLabels" . | nindent 6 }}
      pg-duckdb/role: primary
  template:
    metadata:
      labels:
        {{- include "pg-duckdb.selectorLabels" . | nindent 8 }}
        pg-duckdb/role: primary
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: postgres
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgres.port }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            {{- include "pg-duckdb.env" . | nindent 12 }}
          volumeMounts:
            {{- include "pg-duckdb.volumeMounts" . | nindent 12 }}
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/00-init.sql
              subPath: 00-init.sql
              readOnly: true
            {{- if or .Values.s3.accessKeyId .Values.existingSecret.enabled }}
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/01-s3-secret.sh
              subPath: 01-s3-secret.sh
              readOnly: true
            {{- end }}
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/02-replication.sh
              subPath: 02-replication.sh
              readOnly: true
          {{- include "pg-duckdb.probes" . | nindent 10 }}
          {{- with .Values.primary.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: init-scripts
          configMap:
            name: {{ include "pg-duckdb.fullname" . }}-init
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- else }}
      - name: data
        emptyDir: {}
  {{- end }}
