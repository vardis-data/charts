{{- if .Values.primary.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "pg-duckdb.fullname" . }}
  labels:
    {{- include "pg-duckdb.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "pg-duckdb.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.primary.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: postgres
        minAllowed:
          {{- toYaml .Values.primary.vpa.minAllowed | nindent 10 }}
        maxAllowed:
          {{- toYaml .Values.primary.vpa.maxAllowed | nindent 10 }}
{{- end }}
