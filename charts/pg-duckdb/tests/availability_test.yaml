suite: availability tests
templates:
  - templates/statefulset.yaml
  - templates/deployment-replicas.yaml
  - templates/pdb-primary.yaml
  - templates/pdb-replicas.yaml
  - templates/networkpolicy.yaml
tests:
  - it: should render primary pdb by default
    template: templates/pdb-primary.yaml
    asserts:
      - isKind:
          of: PodDisruptionBudget

  - it: should not render replicas pdb by default
    template: templates/pdb-replicas.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render network policy when enabled
    template: templates/networkpolicy.yaml
    set:
      networkPolicy:
        enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy

  - it: should render primary anti-affinity by default
    template: templates/statefulset.yaml
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity

  - it: should render replicas topology spread by default
    template: templates/deployment-replicas.yaml
    asserts:
      - exists:
          path: spec.template.spec.topologySpreadConstraints
