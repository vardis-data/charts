suite: extension management tests
templates:
  - templates/job-manage-extensions.yaml
  - templates/configmap.yaml
  - templates/statefulset.yaml
  - templates/secret.yaml
tests:
  - it: should render extension hook job by default
    template: templates/job-manage-extensions.yaml
    asserts:
      - isKind:
          of: Job

  - it: should set cron database name when pg_cron preloaded
    template: templates/job-manage-extensions.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: "ALTER SYSTEM SET cron.database_name"

  - it: should not manage shared_preload_libraries via ALTER SYSTEM in the job
    template: templates/job-manage-extensions.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: "ALTER SYSTEM SET shared_preload_libraries"

  - it: should pass shared_preload_libraries with pg_duckdb always included as a CLI arg to postgres
    template: templates/statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "shared_preload_libraries=pg_duckdb,pg_cron"

  - it: should emit cron.database_name in init SQL when pg_cron preloaded
    template: templates/configmap.yaml
    asserts:
      - matchRegex:
          path: data["00-init.sql"]
          pattern: "ALTER SYSTEM SET cron.database_name = 'warehouse'"

  - it: should not set shared_preload_libraries via ALTER SYSTEM in init SQL
    template: templates/configmap.yaml
    asserts:
      - notMatchRegex:
          path: data["00-init.sql"]
          pattern: "ALTER SYSTEM SET shared_preload_libraries"
