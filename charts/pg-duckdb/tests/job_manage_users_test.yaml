suite: manage users job tests
templates:
  - templates/job-manage-users.yaml
tests:
  - it: should not render when no users
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when users configured
    set:
      postgres:
        users:
          - name: analyst
            login: false
            passwordSecret:
              name: analyst-creds
              key: password
            schemas:
              marts: read
    asserts:
      - isKind:
          of: Job

  - it: should have helm hook annotations
    set:
      postgres:
        users:
          - name: analyst
            login: false
            passwordSecret:
              name: analyst-creds
              key: password
            schemas:
              marts: read
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation

  - it: should inject password env var from secret
    set:
      postgres:
        users:
          - name: analyst
            login: false
            passwordSecret:
              name: analyst-creds
              key: password
            schemas:
              marts: read
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: USER_ANALYST_PASSWORD
            valueFrom:
              secretKeyRef:
                name: analyst-creds
                key: password

  - it: should grant read access to configured schemas
    set:
      postgres:
        users:
          - name: analyst
            login: false
            passwordSecret:
              name: analyst-creds
              key: password
            schemas:
              marts: read
              seeds: read
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: 'GRANT USAGE ON SCHEMA \\"marts\\" TO \\"analyst\\"'
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: 'GRANT USAGE ON SCHEMA \\"seeds\\" TO \\"analyst\\"'

  - it: should support multiple users
    set:
      postgres:
        users:
          - name: analyst
            login: true
            passwordSecret:
              name: analyst-creds
              key: password
            schemas:
              marts: read
          - name: admin
            login: false
            schemas:
              marts: write
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: USER_ANALYST_PASSWORD
            valueFrom:
              secretKeyRef:
                name: analyst-creds
                key: password

  - it: should support grants_to for role switching
    set:
      postgres:
        users:
          - name: authenticator
            login: true
            passwordSecret:
              name: auth-creds
              key: password
            grantsTo: ["anon", "admin"]
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: 'GRANT \\"anon\\" TO \\"authenticator\\"'
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: 'GRANT \\"admin\\" TO \\"authenticator\\"'
