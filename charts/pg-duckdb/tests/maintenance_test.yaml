suite: maintenance tests
templates:
  - templates/cronjob-analyze.yaml
  - templates/cronjob-vacuum.yaml
  - templates/cronjob-pgstattuple.yaml
  - templates/job-pg-repack.yaml
tests:
  - it: should render analyze cronjob by default
    template: templates/cronjob-analyze.yaml
    asserts:
      - isKind:
          of: CronJob

  - it: should render vacuum cronjob by default
    template: templates/cronjob-vacuum.yaml
    asserts:
      - isKind:
          of: CronJob

  - it: should render pgstattuple cronjob by default
    template: templates/cronjob-pgstattuple.yaml
    asserts:
      - isKind:
          of: CronJob

  - it: should not render repack job by default
    template: templates/job-pg-repack.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render repack job when enabled and table set
    template: templates/job-pg-repack.yaml
    set:
      maintenance:
        repack:
          enabled: true
          table: public.events
    asserts:
      - isKind:
          of: Job
      - matchRegex:
          path: spec.template.spec.containers[0].args[0]
          pattern: '--table=public\.events'
