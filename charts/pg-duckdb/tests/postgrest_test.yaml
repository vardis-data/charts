suite: postgrest deployment tests
templates:
  - templates/postgrest-deployment.yaml
tests:
  - it: should not render when postgrest disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when postgrest enabled
    set:
      postgrest:
        enabled: true
    asserts:
      - isKind:
          of: Deployment

  - it: should render imagePullSecrets when set
    set:
      postgrest:
        enabled: true
      imagePullSecrets:
        - name: ghcr-credentials
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-credentials
