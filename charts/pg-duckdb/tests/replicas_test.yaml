suite: replicas tests
templates:
  - templates/deployment-replicas.yaml
tests:
  - it: should render deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have replica role label
    asserts:
      - equal:
          path: spec.template.metadata.labels["pg-duckdb/role"]
          value: replica

  - it: should have wait-for-primary init container first
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-primary

  - it: should have init-replica init container second
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: init-replica

  - it: should use emptyDir for replica data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should run as postgres user
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 999
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999

  - it: should render imagePullSecrets when set
    set:
      imagePullSecrets:
        - name: ghcr-credentials
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-credentials
