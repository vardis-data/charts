suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should not render when existingSecret is enabled
    set:
      existingSecret:
        enabled: true
        name: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should contain password
    set:
      postgres:
        password: test-password
    asserts:
      - equal:
          path: stringData.password
          value: "test-password"

  - it: should contain S3 credentials when configured
    set:
      s3:
        accessKeyId: test-key
        secretAccessKey: test-secret
    asserts:
      - equal:
          path: stringData.s3AccessKeyId
          value: "test-key"
      - equal:
          path: stringData.s3SecretAccessKey
          value: "test-secret"
