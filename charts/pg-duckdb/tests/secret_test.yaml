suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret when no passwordSecret
    asserts:
      - isKind:
          of: Secret

  - it: should not render when passwordSecret is set
    set:
      passwordSecret:
        name: my-password-secret
        key: password
    asserts:
      - hasDocuments:
          count: 0

  - it: should contain password
    set:
      postgres:
        password: test-password
    asserts:
      - equal:
          path: stringData.password
          value: "test-password"

  - it: should contain S3 credentials when inline
    set:
      s3:
        accessKeyId: test-key
        secretAccessKey: test-secret
    asserts:
      - equal:
          path: stringData.s3AccessKeyId
          value: "test-key"
      - equal:
          path: stringData.s3SecretAccessKey
          value: "test-secret"

  - it: should not contain S3 credentials when using existing secret
    set:
      s3:
        existingSecret:
          name: s3-credentials
    asserts:
      - notExists:
          path: stringData.s3AccessKeyId
      - notExists:
          path: stringData.s3SecretAccessKey
