suite: statefulset tests
templates:
  - templates/statefulset.yaml
tests:
  - it: should render statefulset
    asserts:
      - isKind:
          of: StatefulSet

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pg-duckdb

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pg-duckdb:sha-latest"

  - it: should have primary role label
    asserts:
      - equal:
          path: spec.template.metadata.labels["pg-duckdb/role"]
          value: primary

  - it: should have postgres port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5432

  - it: should set POSTGRES_DB
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_DB
            value: "warehouse"

  - it: should mount init SQL via subPath
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: init-scripts
            mountPath: /docker-entrypoint-initdb.d/00-init.sql
            subPath: 00-init.sql
            readOnly: true

  - it: should mount replication script via subPath
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: init-scripts
            mountPath: /docker-entrypoint-initdb.d/02-replication.sh
            subPath: 02-replication.sh
            readOnly: true

  - it: should create PVC when persistence enabled
    asserts:
      - exists:
          path: spec.volumeClaimTemplates

  - it: should have probes
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe
      - exists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should run as postgres user
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 999
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999

  - it: should render imagePullSecrets when set
    set:
      imagePullSecrets:
        - name: ghcr-credentials
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: ghcr-credentials

  - it: should set S3 credentials when configured
    set:
      s3:
        accessKeyId: test-key
        secretAccessKey: test-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: S3_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-pg-duckdb
                key: s3AccessKeyId
