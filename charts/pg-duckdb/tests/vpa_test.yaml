suite: vpa tests
templates:
  - templates/vpa.yaml
tests:
  - it: should not render when vpa disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render VPA for primary only
    set:
      primary:
        vpa:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1

  - it: should target the primary statefulset
    set:
      primary:
        vpa:
          enabled: true
    asserts:
      - equal:
          path: spec.targetRef.kind
          value: StatefulSet
      - equal:
          path: spec.targetRef.name
          value: RELEASE-NAME-pg-duckdb
