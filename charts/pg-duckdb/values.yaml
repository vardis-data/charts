# -- PostgreSQL + pg_duckdb container image
image:
  repository: ghcr.io/vardis-data/pg-duckdb
  # renovate: datasource=docker depName=ghcr.io/vardis-data/pg-duckdb
  tag: "sha-latest"
  pullPolicy: IfNotPresent

# -- PostgreSQL configuration for the primary instance
postgres:
  # -- Database name created on first boot
  database: warehouse
  # -- Superuser name created on first boot
  user: warehouse
  # -- Superuser password (ignored when existingSecret.enabled is true)
  password: ""
  # -- PostgreSQL listen port
  port: 5432
  # -- Database users managed by Terraform.
  # -- Supports both LOGIN (direct connection) and NOLOGIN (permission groups) users.
  # -- Schema access levels: "read" (SELECT) or "write" (ALL privileges).
  users: []
  # -- users:
  # --   - name: authenticator
  # --     login: true
  # --     passwordSecret:
  # --       name: warehouse-user-authenticator
  # --       key: password
  # --     grantsTo: ["anon", "admin"]
  # --   - name: anon
  # --     login: false
  # --     schemas:
  # --       prod: read
  # --   - name: admin
  # --     login: false
  # --     schemas:
  # --       prod: write
  # -- PostgreSQL runtime tuning applied with ALTER SYSTEM.
  tuning:
    autovacuumVacuumScaleFactor: "0.05"
    autovacuumAnalyzeScaleFactor: "0.02"
    autovacuumVacuumThreshold: "50"
    autovacuumAnalyzeThreshold: "50"
    autovacuumNaptime: "30s"
    maintenanceWorkMem: "256MB"
    checkpointTimeout: "15min"
    minWalSize: "1GB"
    maxWalSize: "4GB"

# -- PostgreSQL extensions to create in the target database.
# -- `install` runs on first bootstrap and also via a post-install/upgrade hook job.
# -- `sharedPreloadLibraries` configures `shared_preload_libraries` with ALTER SYSTEM.
# -- Libraries like pg_cron require a pod restart after this setting changes.
extensions:
  # -- Extensions to create in .Values.postgres.database.
  install:
    - pg_duckdb
    - pgstattuple
    - pg_repack
    - pg_cron
  # -- Libraries to preload at PostgreSQL startup (comma-joined).
  sharedPreloadLibraries:
    - pg_cron
  hook:
    # -- Enable post-install/post-upgrade extension management job.
    enabled: true

# -- Maintenance jobs for extension-driven operations.
maintenance:
  analyze:
    # -- Run ANALYZE to keep planner stats fresh.
    enabled: true
    # -- Every 12 hours.
    schedule: "15 */12 * * *"
    # -- Optional schema filters for analyze job.
    schemas: []
    # -- Extra args passed to vacuumdb.
    extraArgs: []
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  vacuum:
    # -- Run VACUUM (ANALYZE) for periodic table cleanup.
    enabled: true
    # -- Weekly at 04:00 UTC.
    schedule: "0 4 * * 0"
    # -- Optional schema filters for vacuum job.
    schemas: []
    # -- Extra args passed to vacuumdb.
    extraArgs: []
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi

  pgstattuple:
    # -- Run periodic bloat snapshots using pgstattuple_approx.
    enabled: true
    # -- Weekly at 03:30 UTC.
    schedule: "30 3 * * 0"
    # -- Keep history for this many days.
    retentionDays: 30
    # -- Only scan relations larger than this size (MB).
    minTableSizeMb: 256
    # -- Schema used for maintenance history tables.
    schema: maintenance
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  repack:
    # -- One-shot pg_repack job (manual trigger via values override).
    enabled: false
    # -- Optional table to repack (schema-qualified, e.g. public.events).
    table: ""
    # -- Optional schema to repack when table is empty.
    schema: ""
    # -- Extra args passed to pg_repack.
    extraArgs: []
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi

# -- Scheduling controls for primary and replicas.
scheduling:
  primary:
    antiAffinity:
      enabled: true
      weight: 100
      topologyKey: kubernetes.io/hostname
  replicas:
    antiAffinity:
      enabled: true
      weight: 100
      topologyKey: kubernetes.io/hostname
    topologySpread:
      enabled: true
      maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway

# -- Pod disruption budgets for safer voluntary disruptions.
pdb:
  primary:
    enabled: true
    minAvailable: 1
  replicas:
    enabled: false
    minAvailable: 1

# -- Network policy for database pods.
networkPolicy:
  enabled: false
  allowSameNamespace: true
  extraIngress: []

# -- DuckDB engine settings applied via init SQL.
# -- Each connection gets its own DuckDB instance with these limits.
# -- Primary handles dbt writes (heavier, less concurrent).
# -- Replicas handle analyst reads (lighter, more concurrent).
duckdb:
  # -- Route all analytical queries through DuckDB's vectorized engine.
  # -- When true, SELECT queries on regular Postgres tables are executed
  # -- by DuckDB for columnar performance (aggregations, GROUP BY, etc.).
  forceExecution: false
  primary:
    # -- Maximum memory per DuckDB instance on the primary (e.g. "2GB", "4GB")
    memoryLimit: 2GB
    # -- Maximum threads per DuckDB instance on the primary
    threads: 2
  replicas:
    # -- Maximum memory per DuckDB instance on replicas
    memoryLimit: 1GB
    # -- Maximum threads per DuckDB instance on replicas
    threads: 1

# -- S3-compatible storage credentials for pg_duckdb to read Parquet files.
# -- Works with any S3-compatible API (AWS, Hetzner Object Storage, MinIO).
s3:
  # -- S3 endpoint URL (e.g. "https://nbg1.your-objectstorage.com")
  endpoint: ""
  # -- S3 region (e.g. "nbg1", "us-east-1")
  region: ""
  # -- S3 access key ID (ignored when existingSecret.name is set)
  accessKeyId: ""
  # -- S3 secret access key (ignored when existingSecret.name is set)
  secretAccessKey: ""
  # -- Reference an existing K8s Secret for S3 credentials
  existingSecret:
    name: ""
    keys:
      accessKeyId: "s3AccessKeyId"
      secretAccessKey: "s3SecretAccessKey"

# -- Reference an existing K8s Secret for the Postgres password.
# -- When not set, password is taken from postgres.password.
passwordSecret:
  name: ""
  key: "password"

# -- Persistent volume for the primary instance data directory.
# -- Replicas use emptyDir (ephemeral) and rebuild from the primary on restart.
persistence:
  enabled: true
  # -- Volume size for the primary PVC
  size: 10Gi
  # -- Storage class (leave empty for cluster default, e.g. Hetzner CSI)
  storageClass: ""

# -- Primary service (read-write) and optional replicas service (read-only).
# -- dbt connects to the primary service. Analysts connect to the replicas service.
service:
  type: ClusterIP
  port: 5432

# -- Primary instance configuration (StatefulSet, single pod).
# -- Handles dbt writes and WAL streaming to replicas.
# -- VPA adjusts resources based on actual usage (requires VPA operator).
primary:
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  # -- Vertical Pod Autoscaler for the primary only.
  # -- Not applied to replicas (HPA manages replica scaling instead).
  vpa:
    enabled: false
    # -- Update mode: "Auto" (restarts pods), "Initial" (only new pods), "Off" (recommendations only)
    updateMode: Auto
    minAllowed:
      cpu: 250m
      memory: 512Mi
    maxAllowed:
      cpu: 4000m
      memory: 8Gi

# -- Read replicas with horizontal autoscaling.
# -- Each replica bootstraps via pg_basebackup from the primary and
# -- continuously replays WAL changes. Replicas accept read-only queries
# -- and each has its own pg_duckdb instance for analytical workloads.
# -- HPA scales the replica count based on CPU utilization.
# -- At least one replica is always running to isolate reads from writes.
replicas:
  # -- Minimum number of read replicas (also the initial count)
  minReplicas: 1
  # -- Maximum number of read replicas HPA can scale to
  maxReplicas: 3
  # -- CPU utilization threshold to trigger scale-up (percentage)
  targetCPUUtilizationPercentage: 70
  # -- Resource requests/limits per replica pod
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# -- Postgres metrics exporter sidecar.
# -- Exposes pg_stat_* metrics as Prometheus metrics on port 9187.
# -- Scraped by VictoriaMetrics/Prometheus via annotations or ServiceMonitor.
metrics:
  enabled: false
  image:
    repository: prometheuscommunity/postgres-exporter
    # renovate: datasource=docker depName=prometheuscommunity/postgres-exporter
    tag: "v0.16.0"
    pullPolicy: IfNotPresent
  port: 9187
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# -- Stakater Reloader annotation for automatic pod restarts on Secret/ConfigMap changes.
reloader:
  enabled: true

# -- PostgREST configuration for exposing tables as a REST API.
# -- Connects to the replicas service for read-only access.
# TODO: Consider adding PgBouncer when scaling:
#   - Multiple PostgREST replicas (>3 pods)
#   - Other database clients (dbt, analytics tools)
#   - Connection count approaching PostgreSQL limits
#   - High connection churn visible in monitoring
#   PgBouncer benefits: connection pooling, protection against connection exhaustion
postgrest:
  # -- Enable PostgREST deployment
  enabled: false
  image:
    repository: postgrest/postgrest
    # renovate: datasource=docker depName=postgrest/postgrest
    tag: "v12.2.3"
    pullPolicy: IfNotPresent
  # -- Database schemas to expose via the REST API (comma-separated)
  schemas: "public"
  # -- Database role for anonymous (unauthenticated) requests.
  # -- Set to empty string ("") to require authentication for all requests.
  # -- When empty, unauthenticated requests will be rejected with 401.
  anonRole: ""
  # -- Database role for admin (JWT-authenticated) requests.
  # -- Only used when jwt.enabled is true. Leave empty to disable admin role.
  adminRole: ""
  # -- Authenticator password for PostgREST connection.
  # -- If set, uses this password. If empty, generates random or uses lookup.
  authenticatorPassword: ""
  # -- JWT authentication configuration
  jwt:
    # -- Enable JWT authentication
    enabled: false
    # -- JWT secret for signing/verifying tokens (min 32 chars).
    # -- Ignored when existingSecret or jwks is set.
    secret: ""
    # -- Reference an existing K8s Secret for the JWT secret
    existingSecret:
      name: ""
      key: "jwt-secret"
    # -- JWKS URL to fetch on pod startup (e.g., https://auth.example.com/jwks/)
    # -- When set, an init container will fetch the JWKS and PostgREST will use it
    # -- Takes precedence over secret/existingSecret
    jwksUrl: ""
    # -- JWT audience claim to validate
    aud: ""
    # -- JWT issuer claim to validate
    issuer: ""
    # -- JWT claim key for PostgreSQL role (default: role)
    roleClaim: ""
  # -- Service configuration
  service:
    type: ClusterIP
    port: 3000
  # -- Ingress configuration for external access
  ingress:
    # -- Enable ingress for PostgREST
    enabled: false
    # -- Ingress class name (e.g., "traefik", "nginx", "tailscale")
    className: "tailscale"
    # -- Tailscale hostname (without domain suffix)
    hostname: "warehouse-api"
    # -- Tailscale tags (defaults to tag:k8s-{hostname})
    tags: ""
    # -- Ingress annotations
    annotations: {}
    # -- Ingress host configuration
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration
    tls: []
    #  - secretName: postgrest-tls
    #    hosts:
    #      - api.example.com
  # -- Public ingress configuration (e.g., for Traefik)
  # -- Allows separate public and private ingresses
  publicIngress:
    # -- Enable public ingress for PostgREST
    enabled: false
    # -- Ingress class name (e.g., "traefik", "nginx")
    className: "traefik"
    # -- Ingress annotations
    annotations: {}
    # -- Ingress host configuration
    hosts:
      - host: ""
        paths:
          - path: /api
            pathType: Prefix
    # -- TLS configuration
    tls: []
    #  - secretName: postgrest-tls
    #    hosts:
    #      - api.example.com
  # -- Resource requests/limits for PostgREST pod
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- Number of PostgREST replicas
  replicas: 1
