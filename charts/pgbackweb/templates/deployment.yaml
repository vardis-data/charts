apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgbackweb.fullname" . }}
  labels:
    {{- include "pgbackweb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pgbackweb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgbackweb.selectorLabels" . | nindent 8 }}
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      containers:
        - name: pgbackweb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: PBW_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbackweb.secretName" . }}
                  key: {{ if .Values.existingSecret.enabled }}{{ .Values.existingSecret.keys.encryptionKey }}{{ else }}PBW_ENCRYPTION_KEY{{ end }}
            - name: PBW_POSTGRES_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgbackweb.secretName" . }}
                  key: {{ if .Values.existingSecret.enabled }}{{ .Values.existingSecret.keys.databaseUrl }}{{ else }}PBW_POSTGRES_CONN_STRING{{ end }}
            - name: PBW_LISTEN_HOST
              value: {{ .Values.server.host | quote }}
            - name: PBW_LISTEN_PORT
              value: {{ .Values.server.port | quote }}
            {{- if .Values.server.pathPrefix }}
            - name: PBW_PATH_PREFIX
              value: {{ .Values.server.pathPrefix | quote }}
            {{- end }}
            - name: TZ
              value: {{ .Values.timezone | quote }}
          {{- if .Values.localStorage.enabled }}
          volumeMounts:
            - name: backups
              mountPath: /backups
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.server.pathPrefix }}/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.server.pathPrefix }}/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.localStorage.enabled }}
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "pgbackweb.fullname" . }}-backups
      {{- end }}
      restartPolicy: Always
