suite: pvc tests
templates:
  - templates/pvc.yaml
tests:
  - it: should not render PVC when localStorage is disabled
    set:
      localStorage:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PVC when localStorage is enabled
    set:
      localStorage:
        enabled: true
    asserts:
      - isKind:
          of: PersistentVolumeClaim

  - it: should have correct name
    set:
      localStorage:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pgbackweb-backups

  - it: should have correct size
    set:
      localStorage:
        enabled: true
        size: 20Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 20Gi

  - it: should use custom storage class
    set:
      localStorage:
        enabled: true
        storageClassName: fast-storage
    asserts:
      - equal:
          path: spec.storageClassName
          value: "fast-storage"
