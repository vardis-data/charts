suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should not render when existingSecret is enabled
    set:
      existingSecret:
        enabled: true
        name: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pgbackweb

  - it: should have encryption key
    set:
      encryptionKey: my-secret-key
    asserts:
      - equal:
          path: stringData.PBW_ENCRYPTION_KEY
          value: "my-secret-key"

  - it: should generate database URL with embedded postgres
    set:
      postgres:
        enabled: true
        customUser:
          name: pgbackweb
          database: pgbackweb
          password: testpass
    asserts:
      - equal:
          path: stringData.PBW_POSTGRES_CONN_STRING
          value: "postgresql://pgbackweb:testpass@RELEASE-NAME-postgres:5432/pgbackweb?sslmode=disable"

  - it: should generate database URL with external database
    set:
      postgres:
        enabled: false
      database:
        host: external-db.example.com
        port: 5432
        name: mydb
        user: myuser
        password: mypass
        sslMode: require
    asserts:
      - equal:
          path: stringData.PBW_POSTGRES_CONN_STRING
          value: "postgresql://myuser:mypass@external-db.example.com:5432/mydb?sslmode=require"
