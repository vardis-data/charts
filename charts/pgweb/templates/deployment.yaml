apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgweb.fullname" . }}
  labels:
    {{- include "pgweb.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pgweb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgweb.selectorLabels" . | nindent 8 }}
      {{- if .Values.reloader.enabled }}
      annotations:
        reloader.stakater.com/auto: "true"
      {{- end }}
    spec:
      containers:
        - name: pgweb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --bind={{ .Values.server.host }}
            - --listen={{ .Values.server.port }}
            {{- if .Values.server.readOnly }}
            - --readonly
            {{- end }}
            {{- if .Values.server.sessions }}
            - --sessions
            {{- end }}
            {{- if .Values.server.lockSession }}
            - --lock-session
            {{- end }}
            {{- if .Values.server.prefix }}
            - --prefix={{ .Values.server.prefix }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            {{- if or (and .Values.database.host .Values.database.name) .Values.existingSecret.enabled }}
            - name: PGWEB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgweb.secretName" . }}
                  key: {{ if .Values.existingSecret.enabled }}{{ .Values.existingSecret.keys.databaseUrl }}{{ else }}DATABASE_URL{{ end }}
            {{- end }}
            {{- if or .Values.auth.enabled .Values.existingSecret.enabled }}
            - name: PGWEB_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgweb.secretName" . }}
                  key: {{ if .Values.existingSecret.enabled }}{{ .Values.existingSecret.keys.authUser }}{{ else }}AUTH_USER{{ end }}
            - name: PGWEB_AUTH_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "pgweb.secretName" . }}
                  key: {{ if .Values.existingSecret.enabled }}{{ .Values.existingSecret.keys.authPass }}{{ else }}AUTH_PASS{{ end }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      restartPolicy: Always
