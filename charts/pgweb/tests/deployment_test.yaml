suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should render deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pgweb

  - it: should use correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "sosedoff/pgweb:0.17.0"

  - it: should have correct container port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8081

  - it: should have reloader annotation by default
    asserts:
      - equal:
          path: spec.template.metadata.annotations["reloader.stakater.com/auto"]
          value: "true"

  - it: should disable reloader annotation when configured
    set:
      reloader:
        enabled: false
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: should enable sessions by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--sessions"

  - it: should enable read-only mode when configured
    set:
      server:
        readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--readonly"

  - it: should set URL prefix when configured
    set:
      server:
        prefix: /pgweb
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--prefix=/pgweb"

  - it: should have default resources
    asserts:
      - exists:
          path: spec.template.spec.containers[0].resources

  - it: should have liveness and readiness probes
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe
      - exists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should use TCP probes to avoid 401 errors when auth is enabled
    asserts:
      - exists:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket
      - exists:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: http

  - it: should not use HTTP probes that fail with auth
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe.httpGet
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe.httpGet

  - it: should set database URL env when database configured
    set:
      database:
        host: db.example.com
        name: mydb
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGWEB_DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-pgweb
                key: DATABASE_URL

  - it: should set auth env when auth enabled
    set:
      auth:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGWEB_AUTH_USER
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-pgweb
                key: AUTH_USER
