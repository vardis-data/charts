suite: secret tests
templates:
  - templates/secret.yaml
tests:
  - it: should render secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-pgweb

  - it: should contain DATABASE_URL when database configured
    set:
      database:
        host: db.example.com
        port: 5432
        name: mydb
        user: myuser
        password: mypass
        sslMode: require
    asserts:
      - equal:
          path: stringData.DATABASE_URL
          value: "postgres://myuser:mypass@db.example.com:5432/mydb?sslmode=require"

  - it: should contain auth credentials when enabled
    set:
      auth:
        enabled: true
        user: admin
        pass: secret123
    asserts:
      - equal:
          path: stringData.AUTH_USER
          value: "admin"
      - equal:
          path: stringData.AUTH_PASS
          value: "secret123"

  - it: should not contain DATABASE_URL when no host configured
    set:
      database:
        host: ""
    asserts:
      - notExists:
          path: stringData.DATABASE_URL

  - it: should not contain auth when disabled
    set:
      auth:
        enabled: false
    asserts:
      - notExists:
          path: stringData.AUTH_USER
      - notExists:
          path: stringData.AUTH_PASS
