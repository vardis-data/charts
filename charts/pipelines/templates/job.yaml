apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pipeline.jobName" . }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    {{- include "pipeline.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "pipeline.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: workflow-submitter
          image: {{ include "pipeline.fullImageName" . }}
          command:
            - "uv"
            - "run"
            - "--no-dev"
            - "--package"
            - {{ include "pipeline.packageName" . | quote }}
            - "python"
            - "-m"
            - {{ printf "%s.main" (include "pipeline.packageName" .) | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Values.sharedConfigMap }}
            - configMapRef:
                name: {{ include "pipeline.configmapName" . }}
            - secretRef:
                name: {{ .Values.sharedSecret }}
