suite: configmap tests
templates:
  - templates/configmap.yaml
tests:
  - it: should render configmap
    set:
      pipeline:
        name: test-pipeline
    asserts:
      - isKind:
          of: ConfigMap

  - it: should have correct name format using release name
    set:
      pipeline:
        name: test-pipeline
    asserts:
      - equal:
          path: metadata.name
          value: pipeline-RELEASE-NAME-variables

  - it: should fail without pipeline name
    asserts:
      - failedTemplate:
          errorMessage: "pipeline.name is required"

  - it: should set all config values from resources
    set:
      pipeline:
        name: test-pipeline
        schedule: "0 5 * * 1"
        resources:
          parallelism: 5
          batchSize: 100
          retryLimit: 10
        image:
          pullPolicy: Never
    asserts:
      - equal:
          path: data.PIPELINE_SCHEDULE_CRON
          value: "0 5 * * 1"
      - equal:
          path: data.PIPELINE_PARALLELISM
          value: "5"
      - equal:
          path: data.PIPELINE_BATCH_SIZE
          value: "100"
      - equal:
          path: data.PIPELINE_RETRY_LIMIT
          value: "10"
      - equal:
          path: data.K8S_IMAGE_PULL_POLICY
          value: "Never"

  - it: should set overwrite parquet files to 1 when enabled
    set:
      pipeline:
        name: test-pipeline
        storage:
          overwriteParquetFiles: true
    asserts:
      - equal:
          path: data.PIPELINE_OVERWRITE_PARQUET_FILES
          value: "1"

  - it: should set overwrite parquet files to 0 when disabled
    set:
      pipeline:
        name: test-pipeline
        storage:
          overwriteParquetFiles: false
    asserts:
      - equal:
          path: data.PIPELINE_OVERWRITE_PARQUET_FILES
          value: "0"

  - it: should use custom namespace
    set:
      pipeline:
        name: test-pipeline
      namespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should pass through custom env vars
    set:
      pipeline:
        name: test-pipeline
        env:
          PIPELINE_BASE_URL: "https://example.com/data"
          PIPELINE_DATASET_FILE_EXTENSION: ".csv"
    asserts:
      - equal:
          path: data.PIPELINE_BASE_URL
          value: "https://example.com/data"
      - equal:
          path: data.PIPELINE_DATASET_FILE_EXTENSION
          value: ".csv"
