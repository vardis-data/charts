suite: imageupdater tests
templates:
  - templates/imageupdater.yaml
tests:
  - it: should not render when disabled
    set:
      pipeline:
        name: test
      imageUpdater:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render imageupdater when enabled
    set:
      pipeline:
        name: test
      imageUpdater:
        enabled: true
        argocdNamespace: argocd
        updateStrategy: latest
    asserts:
      - isKind:
          of: ImageUpdater
      - equal:
          path: metadata.name
          value: RELEASE-NAME

  - it: should set namespace from values
    set:
      pipeline:
        name: test
      imageUpdater:
        enabled: true
        argocdNamespace: argocd
        updateStrategy: latest
    asserts:
      - equal:
          path: spec.namespace
          value: argocd

  - it: should set update strategy
    set:
      pipeline:
        name: test
      imageUpdater:
        enabled: true
        argocdNamespace: argocd
        updateStrategy: semver
    asserts:
      - equal:
          path: spec.applicationRefs[0].images[0].commonUpdateSettings.updateStrategy
          value: semver
