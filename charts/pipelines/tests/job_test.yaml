suite: job tests
templates:
  - templates/job.yaml
tests:
  - it: should render job
    set:
      pipeline:
        name: test-pipeline
    asserts:
      - isKind:
          of: Job

  - it: should have correct name format using release name
    set:
      pipeline:
        name: test-pipeline
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-submit

  - it: should convert dashes to underscores in image name
    set:
      pipeline:
        name: ans-dicionario-de-variaveis
        image:
          repository: ghcr.io/vardis-data/pipelines
          tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pipelines/ans_dicionario_de_variaveis:latest"

  - it: should convert dashes to underscores in package name
    set:
      pipeline:
        name: ans-procedimentos-uf
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: "ans_procedimentos_uf"
      - contains:
          path: spec.template.spec.containers[0].command
          content: "ans_procedimentos_uf.main"

  - it: should convert dashes to underscores in workdir
    set:
      pipeline:
        name: ans-procedimentos-uf
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: "--package"

  - it: multi-dataset pipeline should use custom datasetName for env var but derive image from pipeline name
    set:
      pipeline:
        name: ans-procedimentos-uf
        datasetName: ans_amb
        image:
          repository: ghcr.io/vardis-data/pipelines
          tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pipelines/ans_procedimentos_uf:latest"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PIPELINE_DATASET_NAME
            value: "ans_amb"

  - it: single-dataset pipeline should derive datasetName from pipeline name
    set:
      pipeline:
        name: ans-dicionario-de-variaveis
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PIPELINE_DATASET_NAME
            value: "ans_dicionario_de_variaveis"

  - it: should have schedule env var
    set:
      pipeline:
        name: test-pipeline
        schedule: "0 12 * * *"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PIPELINE_SCHEDULE_CRON
            value: "0 12 * * *"

  - it: should have image pull secrets
    set:
      pipeline:
        name: test-pipeline
      imagePullSecrets:
        - name: my-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-secret

  - it: should reference shared configmap
    set:
      pipeline:
        name: test-pipeline
      sharedConfigMap: my-shared-config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: my-shared-config

  - it: should reference shared secret
    set:
      pipeline:
        name: test-pipeline
      sharedSecret: my-shared-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-shared-secret

  - it: should use image.name when provided (shared image scenario)
    set:
      pipeline:
        name: ans-procedimentos-ambulatoriais-uf
        image:
          name: ans_procedimentos_uf
          repository: ghcr.io/vardis-data/pipelines
          tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pipelines/ans_procedimentos_uf:latest"

  - it: should derive image from pipeline.name when image.name not provided
    set:
      pipeline:
        name: ans-dicionario-de-variaveis
        image:
          repository: ghcr.io/vardis-data/pipelines
          tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pipelines/ans_dicionario_de_variaveis:latest"

  - it: should use image.name with custom datasetName for multi-workflow pipeline
    set:
      pipeline:
        name: ans-procedimentos-hospitalares-uf
        datasetName: hospitalares
        image:
          name: ans_procedimentos_uf
          repository: ghcr.io/vardis-data/pipelines
          tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/vardis-data/pipelines/ans_procedimentos_uf:latest"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PIPELINE_DATASET_NAME
            value: "hospitalares"

  - it: should have template metadata labels for Job replacement compatibility
    set:
      pipeline:
        name: test-pipeline
    asserts:
      - isNotNull:
          path: spec.template.metadata.labels
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: test-pipeline
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should have ArgoCD hook annotations for job recreation
    set:
      pipeline:
        name: test-pipeline
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: Sync
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
          value: BeforeHookCreation,HookSucceeded

  - it: should use image.name for package name when provided (shared image multi-workflow)
    set:
      pipeline:
        name: ans-procedimentos-ambulatoriais-uf
        image:
          name: ans_procedimentos_uf
    asserts:
      - contains:
          path: spec.template.spec.containers[0].command
          content: "ans_procedimentos_uf"
      - contains:
          path: spec.template.spec.containers[0].command
          content: "ans_procedimentos_uf.main"

  - it: should use local image when repository is empty
    set:
      pipeline:
        name: ans-procedimentos
        image:
          repository: ""
          tag: local
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ans_procedimentos:local"
