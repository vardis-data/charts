# -- Pipeline configuration
pipeline:
  # -- (required) Pipeline name, used for k8s resource naming (hyphens)
  name: ""
  # -- Override dataset name if different from pipeline name (underscores)
  # If empty, derived from pipeline.name by replacing hyphens with underscores
  datasetName: ""

  # -- Cron schedule for the workflow (k8s cron format)
  schedule: "0 0 * * 1"
  # -- Base URL for data source (required for scraping pipelines)
  baseUrl: ""
  # -- File extension to filter when scraping URLs (e.g., ".zip", ".ods")
  datasetFileExtension: ""

  # -- Container image configuration
  image:
    # -- Image repository (pipeline name is appended)
    repository: ghcr.io/vardis-data/pipelines
    # -- Image tag
    tag: latest
    # -- Image pull policy
    pullPolicy: Always

  # -- Resource and execution configuration
  resources:
    # -- Max parallel workflow steps
    parallelism: 2
    # -- Number of URLs per batch/chunk
    batchSize: 50
    # -- Python multiprocessing workers per step
    multiprocessingWorkers: 2
    # -- Max retry attempts for failed steps
    retryLimit: 3

  # -- Logging configuration
  logging:
    # -- Log level (DEBUG, INFO, WARNING, ERROR)
    level: INFO

  # -- Storage configuration
  storage:
    # -- Overwrite existing parquet files in GCS
    overwriteParquetFiles: false

# -- Kubernetes namespace for pipeline resources
namespace: pipelines

# -- Image pull secrets for private registries
imagePullSecrets:
  - name: ghcr-secret

# -- Shared ConfigMap with common pipeline variables
sharedConfigMap: pipelines-variables
# -- Shared Secret with credentials (GCS, etc.)
sharedSecret: pipelines-secrets
