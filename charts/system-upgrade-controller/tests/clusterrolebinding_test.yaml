suite: clusterrolebinding tests
templates:
  - templates/clusterrolebinding.yaml
tests:
  - it: should render clusterrolebinding with correct kind
    asserts:
      - isKind:
          of: ClusterRoleBinding

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: system-upgrade

  - it: should have standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: system-upgrade-controller
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should reference correct clusterrole
    asserts:
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: system-upgrade

  - it: should bind to system-upgrade serviceaccount
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: system-upgrade
            namespace: NAMESPACE

  - it: should use release namespace for serviceaccount
    release:
      namespace: kube-system
    asserts:
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: system-upgrade
            namespace: kube-system
