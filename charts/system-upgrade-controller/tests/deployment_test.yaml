suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should render deployment with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: system-upgrade-controller
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should use correct image with default tag
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: rancher/system-upgrade-controller:v0.19.0

  - it: should use custom image when specified
    set:
      image.repository: custom/controller
      image.tag: v1.0.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom/controller:v1.0.0

  - it: should have correct selector labels
    asserts:
      - equal:
          path: spec.selector.matchLabels["upgrade.cattle.io/controller"]
          value: system-upgrade-controller
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: system-upgrade-controller

  - it: should have control-plane node affinity
    asserts:
      - contains:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions
          content:
            key: node-role.kubernetes.io/control-plane
            operator: Exists

  - it: should have linux OS affinity
    asserts:
      - contains:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions
          content:
            key: kubernetes.io/os
            operator: In
            values:
              - linux

  - it: should use system-upgrade service account
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: system-upgrade

  - it: should have default tolerations
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

  - it: should mount SSL certificates
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: etc-ssl
            mountPath: /etc/ssl
            readOnly: true

  - it: should have tmp emptyDir volume
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tmp
            emptyDir: {}

  - it: should apply container security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 65534

  - it: should have required environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SYSTEM_UPGRADE_CONTROLLER_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.labels['upgrade.cattle.io/controller']
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SYSTEM_UPGRADE_CONTROLLER_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace

  - it: should reference configmap for envFrom
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: system-upgrade-controller
