inputs:
  flake-utils:
    url: github:numtide/flake-utils
  flakes:
    url: git+ssh://git@github.com/vardis-data/flakes.git
    inputs:
      nixpkgs:
        follows: nixpkgs
      utils:
        follows: flake-utils
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  nixpkgs-python:
    url: github:cachix/nixpkgs-python
    inputs:
      nixpkgs:
        follows: nixpkgs
